    <script>
        const SUPABASE_URL = 'https://rzcprbfaxgxtggjghbds.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_E6wmdZuRD5Xe3dzLwt_KCw_FZl0Y4YJ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let allParts = {
            'blade': [], 'ratchet': [], 'bit': [], 
            'lock-chip': [], 'over-blade': [], 'assist-blade': []
        };
        
        let globalTournaments = []; 

        let currentCategory = 'all'; 
        let currentSystemFilter = 'ALL';
        let currentSortCriteria = 'pickRate'; 

        function toggleMenu() {
            const navLinks = document.getElementById('nav-links');
            const menuBtnIcon = document.querySelector('#mobile-menu-btn i');
            navLinks.classList.toggle('hidden'); navLinks.classList.toggle('flex');
            menuBtnIcon.classList.toggle('fa-bars'); menuBtnIcon.classList.toggle('fa-xmark');
        }

        async function fetchAllData() {
            try {
                const [
                    { data: blades }, { data: ratchets }, { data: bits },
                    { data: lockChips }, { data: overBlades }, { data: assistBlades },
                    { data: tournamentsData }
                ] = await Promise.all([
                    supabaseClient.from('blades').select('*'),
                    supabaseClient.from('ratchets').select('*'),
                    supabaseClient.from('bits').select('*'),
                    supabaseClient.from('lock_chips').select('*'),
                    supabaseClient.from('over_blades').select('*'),
                    supabaseClient.from('assist_blades').select('*'),
                    supabaseClient.from('tournaments').select(`
                        date,
                        tournament_combos (
                            rank, blade_id, ratchet_id, bit_id, lock_chip_id, over_blade_id, assist_blade_id
                        )
                    `)
                ]);

                globalTournaments = tournamentsData || [];

                let totalPlayers = 0;
                const partCounts = {
                    'blade': {}, 'ratchet': {}, 'bit': {},
                    'lock-chip': {}, 'over-blade': {}, 'assist-blade': {}
                };
                // 💡 [수정사항] 각 부품별 등수(rank) 합계를 저장할 객체 생성
                const partRankSums = {
                    'blade': {}, 'ratchet': {}, 'bit': {},
                    'lock-chip': {}, 'over-blade': {}, 'assist-blade': {}
                };

                if (globalTournaments.length > 0) {
                    globalTournaments.forEach(t => {
                        if (t.tournament_combos) {
                            const players = new Set(t.tournament_combos.map(c => c.rank)).size;
                            totalPlayers += players;

                            t.tournament_combos.forEach(c => {
                                if (c.blade_id) { partCounts['blade'][c.blade_id] = (partCounts['blade'][c.blade_id] || 0) + 1; partRankSums['blade'][c.blade_id] = (partRankSums['blade'][c.blade_id] || 0) + c.rank; }
                                if (c.ratchet_id) { partCounts['ratchet'][c.ratchet_id] = (partCounts['ratchet'][c.ratchet_id] || 0) + 1; partRankSums['ratchet'][c.ratchet_id] = (partRankSums['ratchet'][c.ratchet_id] || 0) + c.rank; }
                                if (c.bit_id) { partCounts['bit'][c.bit_id] = (partCounts['bit'][c.bit_id] || 0) + 1; partRankSums['bit'][c.bit_id] = (partRankSums['bit'][c.bit_id] || 0) + c.rank; }
                                if (c.lock_chip_id) { partCounts['lock-chip'][c.lock_chip_id] = (partCounts['lock-chip'][c.lock_chip_id] || 0) + 1; partRankSums['lock-chip'][c.lock_chip_id] = (partRankSums['lock-chip'][c.lock_chip_id] || 0) + c.rank; }
                                if (c.over_blade_id) { partCounts['over-blade'][c.over_blade_id] = (partCounts['over-blade'][c.over_blade_id] || 0) + 1; partRankSums['over-blade'][c.over_blade_id] = (partRankSums['over-blade'][c.over_blade_id] || 0) + c.rank; }
                                if (c.assist_blade_id) { partCounts['assist-blade'][c.assist_blade_id] = (partCounts['assist-blade'][c.assist_blade_id] || 0) + 1; partRankSums['assist-blade'][c.assist_blade_id] = (partRankSums['assist-blade'][c.assist_blade_id] || 0) + c.rank; }
                            });
                        }
                    });
                }

                // 💡 [수정사항] 픽률과 평균 등수를 함께 계산하여 반환
                const getStats = (cat, id) => {
                    if (totalPlayers === 0) return { pickRate: 0, avgRank: null };
                    const count = partCounts[cat][id] || 0;
                    const rankSum = partRankSums[cat][id] || 0;
                    const pickRate = Math.round((count / totalPlayers) * 100);
                    const avgRank = count > 0 ? (rankSum / count).toFixed(2) : null;
                    return { pickRate, avgRank };
                };

                allParts['blade'] = (blades || []).map(p => { const st = getStats('blade', p.id); return { ...p, category: 'blade', pickRate: st.pickRate, avgRank: st.avgRank }; });
                allParts['ratchet'] = (ratchets || []).map(p => { const st = getStats('ratchet', p.id); return { ...p, category: 'ratchet', pickRate: st.pickRate, avgRank: st.avgRank }; });
                allParts['bit'] = (bits || []).map(p => { const st = getStats('bit', p.id); return { ...p, category: 'bit', pickRate: st.pickRate, avgRank: st.avgRank }; });
                allParts['lock-chip'] = (lockChips || []).map(p => { const st = getStats('lock-chip', p.id); return { ...p, category: 'lock-chip', pickRate: st.pickRate, avgRank: st.avgRank }; });
                allParts['over-blade'] = (overBlades || []).map(p => { const st = getStats('over-blade', p.id); return { ...p, category: 'over-blade', pickRate: st.pickRate, avgRank: st.avgRank }; });
                allParts['assist-blade'] = (assistBlades || []).map(p => { const st = getStats('assist-blade', p.id); return { ...p, category: 'assist-blade', pickRate: st.pickRate, avgRank: st.avgRank }; });

                renderParts();
            } catch (error) {
                console.error("데이터 로딩 실패:", error);
            }
        }

        function renderParts(filterText = '') {
            const grid = document.getElementById('parts-grid');
            if (!grid) return;
            grid.innerHTML = '';

            let targetParts = [];
            if (currentCategory === 'all') {
                targetParts = [
                    ...allParts['blade'], ...allParts['lock-chip'], ...allParts['over-blade'],
                    ...allParts['assist-blade'], ...allParts['ratchet'], ...allParts['bit']
                ];
            } else {
                targetParts = allParts[currentCategory] || [];
            }

            let filtered = targetParts.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(filterText.toLowerCase());
                const matchesSystem = matchSystemFilter(p);
                return matchesSearch && matchesSystem;
            });

            // 💡 [수정사항] 정렬 로직 고도화 (픽률순 vs 평균 등수순)
            if (currentSortCriteria === 'pickRate') {
                filtered.sort((a, b) => {
                    if (b.pickRate !== a.pickRate) return b.pickRate - a.pickRate;
                    return a.name.localeCompare(b.name, 'ko-KR');
                });
            } else if (currentSortCriteria === 'avgRank') {
                filtered.sort((a, b) => {
                    // 기록이 없는 부품(null)은 맨 뒤로 보내기 위해 999 설정
                    const avgA = a.avgRank ? parseFloat(a.avgRank) : 999;
                    const avgB = b.avgRank ? parseFloat(b.avgRank) : 999;
                    if (avgA !== avgB) return avgA - avgB; // 숫자가 작을수록 1등에 가까우니 오름차순
                    if (b.pickRate !== a.pickRate) return b.pickRate - a.pickRate;
                    return a.name.localeCompare(b.name, 'ko-KR');
                });
            } else {
                filtered.sort((a, b) => a.name.localeCompare(b.name, 'ko-KR'));
            }

            if (filtered.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-gray-400 font-bold">검색 결과가 없습니다.</p>`;
                return;
            }

            filtered.forEach(p => {
                const imgFileName = p.image_url || 'default.webp'; 
                let folder = p.category;
                if(p.category === 'lock-chip') folder = 'lock_chips';
                if(p.category === 'over-blade') folder = 'over_blades';
                if(p.category === 'assist-blade') folder = 'assist_blades';
                if(p.category === 'ratchet') folder = 'ratchets';
                if(p.category === 'bit') folder = 'bits';
                if(p.category === 'blade') folder = 'blades';

                const imgPath = `assets/images/${folder}/${imgFileName}`;
                const systemBadge = getSystemBadge(p.system_type);

                const card = document.createElement('div');
                card.className = "relative bg-white p-2 md:p-3 rounded-xl md:rounded-2xl border border-gray-100 shadow-sm hover:shadow-md hover:border-indigo-200 hover:scale-105 transition-all cursor-pointer flex flex-col items-center group pb-8";
                
                card.innerHTML = `
                    ${systemBadge}
                    <div class="w-full aspect-square img-container rounded-lg md:rounded-xl mb-2 flex items-center justify-center">
                        <img src="${imgPath}" alt="${p.name}" class="w-full h-full object-contain p-1" onerror="this.onerror=null; this.src='https://placehold.co/200?text=No+Image';">
                    </div>
                    <p class="text-[8px] md:text-[10px] text-indigo-400 font-bold mb-0.5 md:mb-1 uppercase tracking-tighter text-center">${p.category.replace('-', ' ')}</p>
                    <h4 class="font-black text-xs md:text-sm text-gray-800 truncate w-full text-center px-1">${p.name}</h4>
                    <span class="absolute bottom-2 right-2 text-[9px] md:text-[10px] font-black text-indigo-600 bg-indigo-50 border border-indigo-100 px-1.5 py-0.5 rounded shadow-sm">${p.pickRate}%</span>
                `;

                card.onclick = () => showPartDetails(p, folder);
                grid.appendChild(card);
            });
        }

        function toggleSortDropdown(event) {
            event.stopPropagation();
            const options = document.getElementById('custom-sort-options');
            const icon = document.getElementById('sort-icon');
            if (options.classList.contains('hidden')) {
                options.classList.remove('hidden'); options.classList.add('flex');
                icon.classList.add('rotate-180');
            } else {
                closeSortDropdown();
            }
        }
        function closeSortDropdown() {
            const options = document.getElementById('custom-sort-options');
            const icon = document.getElementById('sort-icon');
            if (options && !options.classList.contains('hidden')) {
                options.classList.add('hidden'); options.classList.remove('flex');
                if(icon) icon.classList.remove('rotate-180');
            }
        }
        function selectSort(value, text) {
            document.getElementById('custom-sort-text').innerText = text;
            closeSortDropdown();
            currentSortCriteria = value;
            filterParts();
        }
        document.addEventListener('click', (e) => {
            const sortBtn = document.getElementById('custom-sort-btn');
            const sortOptions = document.getElementById('custom-sort-options');
            if (sortBtn && sortOptions && !sortBtn.contains(e.target) && !sortOptions.contains(e.target)) {
                closeSortDropdown();
            }
        });
        function filterParts() {
            const searchInput = document.getElementById('part-search');
            renderParts(searchInput.value);
        }

        function getSystemBadge(systemType) {
            if (!systemType) return '';
            const type = systemType.toLowerCase();
            const badges = [];
            
            let hasMainBadge = false;
            let hasExBadge = false;

            // 1. 메인 시리즈 뱃지 (첫 번째 자리: left-2)
            if (type.includes('cx')) {
                badges.push('<span class="absolute top-2 left-2 bg-green-500 text-[9px] px-2 py-0.5 rounded-md font-black text-white shadow-sm z-10">CX</span>');
                hasMainBadge = true;
            } else if (type.includes('ux')) {
                badges.push('<span class="absolute top-2 left-2 bg-purple-500 text-[9px] px-2 py-0.5 rounded-md font-black text-white shadow-sm z-10">UX</span>');
                hasMainBadge = true;
            } else if (type.includes('bx')) {
                badges.push('<span class="absolute top-2 left-2 bg-blue-500 text-[9px] px-2 py-0.5 rounded-md font-black text-white shadow-sm z-10">BX</span>');
                hasMainBadge = true;
            } else if (type.includes('crossover')) {
                badges.push('<span class="absolute top-2 left-2 bg-yellow-500 text-[9px] px-2 py-0.5 rounded-md font-black text-white shadow-sm z-10">X-OVER</span>');
                hasMainBadge = true;
            }

            // 2. EX 뱃지 처리 (메인 뱃지가 있으면 left-10, 없으면 left-2)
            if (type.includes('ex')) {
                let leftClass = hasMainBadge ? 'left-10' : 'left-2';
                badges.push(`<span class="absolute top-2 ${leftClass} bg-red-500 text-[9px] px-2 py-0.5 rounded-md font-black text-white shadow-sm z-10">EX</span>`);
                hasExBadge = true;
            }

            // 3. CO 뱃지 처리 (앞에 뱃지가 몇 개인지에 따라 위치 자동 조정)
            if (type.includes('co')) {
                let leftClass = 'left-2';
                if (hasMainBadge && hasExBadge) {
                    leftClass = 'left-[4.5rem]'; // 뱃지가 2개 있을 때 3번째 자리
                } else if (hasMainBadge || hasExBadge) {
                    leftClass = 'left-10'; // 뱃지가 1개 있을 때 2번째 자리
                }
                badges.push(`<span class="absolute top-2 ${leftClass} bg-slate-800 text-[9px] px-2 py-0.5 rounded-md font-black text-white shadow-sm z-10">CO</span>`);
            }

            // 4. 우측 뱃지들 (기존 로직 유지)
            if (type.includes('-mode') || type === 'mode') {
                badges.push('<span class="absolute top-2 right-2 bg-indigo-500 text-[9px] px-2 py-0.5 rounded-md font-black text-white shadow-sm z-10">MODE</span>');
            }

            if (type.includes('simple')) {
                badges.push('<span class="absolute top-2 right-2 bg-orange-500 text-[9px] px-2 py-0.5 rounded-md font-black text-white shadow-sm z-10">SIMPLE</span>');
            } else if (type === 'metal') {
                badges.push('<span class="absolute top-2 right-2 bg-gray-500 text-[9px] px-2 py-0.5 rounded-md font-black text-white shadow-sm z-10">METAL</span>');
            } else if (type === 'plastic') {
                badges.push('<span class="absolute top-2 right-2 bg-sky-400 text-[9px] px-2 py-0.5 rounded-md font-black text-white shadow-sm z-10">PLASTIC</span>');
            } else if (type.includes('integrated')) {
                badges.push('<span class="absolute top-2 right-2 bg-emerald-500 text-[9px] px-2 py-0.5 rounded-md font-black text-white shadow-sm z-10">INTEGRATED</span>');
            }
            
            return badges.join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            currentSystemFilter = 'ALL';
            
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('active-tab', 'text-indigo-600');
                btn.classList.add('text-gray-500');
            });
            if (window.event && window.event.currentTarget) {
                window.event.currentTarget.classList.add('active-tab', 'text-indigo-600');
                window.event.currentTarget.classList.remove('text-gray-500');
            }
            
            updateSystemFilterBar();
            document.getElementById('part-search').value = ''; 
            filterParts();
        }

        function updateSystemFilterBar() {
            const container = document.getElementById('filter-container');
            const bar = document.getElementById('system-filter-bar');
            const sortContainer = document.getElementById('sort-container');
            
            if (!bar || !container || !sortContainer) return;
            bar.innerHTML = '';
            
            sortContainer.classList.remove('hidden');
            sortContainer.classList.add('flex');
            container.classList.remove('hidden');
            container.classList.add('mt-4');

            if (currentCategory === 'all' || currentCategory === 'over-blade' || currentCategory === 'assist-blade') {
                bar.classList.add('hidden');
                bar.classList.remove('flex');
            } else {
                bar.classList.remove('hidden');
                bar.classList.add('flex');
                
                if (currentCategory === 'blade') {
                    bar.appendChild(createFilterBtn('ALL'));
                    bar.appendChild(createFilterBtn('BX'));
                    bar.appendChild(createFilterBtn('UX'));
                    bar.appendChild(createFilterBtn('CX'));
                    bar.appendChild(createFilterBtn('EX'));
                    bar.appendChild(createFilterBtn('X-OVER'));
                    bar.appendChild(createFilterBtn('CO'));
                } else if (currentCategory === 'ratchet') {
                    bar.appendChild(createFilterBtn('ALL'));
                    bar.appendChild(createFilterBtn('SIMPLE'));
                } else if (currentCategory === 'bit') {
                    bar.appendChild(createFilterBtn('ALL'));
                    bar.appendChild(createFilterBtn('INTEGRATED'));
                } else if (currentCategory === 'lock-chip') {
                    bar.appendChild(createFilterBtn('ALL'));
                    bar.appendChild(createFilterBtn('METAL'));
                    bar.appendChild(createFilterBtn('PLASTIC'));
                }
            }
            highlightSystemFilterButton('ALL');
        }

        function createFilterBtn(label) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.onclick = () => filterBySystem(label);
            btn.className = 'system-filter-btn rounded-full border border-gray-200 bg-white px-3 py-1.5 text-xs font-bold text-gray-500 transition-all hover:border-indigo-300 hover:text-indigo-600 flex-shrink-0';
            btn.textContent = label;
            return btn;
        }

        function highlightSystemFilterButton(systemType) {
            const buttons = document.querySelectorAll('#system-filter-bar button');
            buttons.forEach(btn => {
                if (btn.innerText === systemType) {
                    btn.classList.add('bg-indigo-500', 'text-white', 'border-indigo-500');
                    btn.classList.remove('text-gray-500', 'bg-white');
                } else {
                    btn.classList.remove('bg-indigo-500', 'text-white', 'border-indigo-500');
                    btn.classList.add('text-gray-500', 'bg-white');
                }
            });
        }

        function matchSystemFilter(part) {
            const type = (part.system_type || '').toLowerCase();
            if (currentCategory === 'blade') {
                switch (currentSystemFilter) {
                    case 'BX': return type.includes('bx'); 
                    case 'UX': return type.includes('ux');
                    case 'CX': return type.includes('cx');
                    case 'EX': return type.includes('cx-ex') || type.includes('ex');
                    case 'X-OVER': return type.includes('crossover'); 
                    case 'CO': return type.includes('co'); 
                    default: return true;
                }
            } else if (currentCategory === 'lock-chip') {
                switch (currentSystemFilter) {
                    case 'METAL': return type.includes('metal');
                    case 'PLASTIC': return type.includes('plastic');
                    default: return true;
                }
            } else if (currentCategory === 'ratchet') {
                switch (currentSystemFilter) {
                    case 'SIMPLE': return type.includes('simple');
                    default: return true;
                }
            } else if (currentCategory === 'bit') {
                switch (currentSystemFilter) {
                    case 'INTEGRATED': return type.includes('integrated');
                    default: return true;
                }
            }
            return true;
        }

        function filterBySystem(systemType) {
            currentSystemFilter = systemType;
            highlightSystemFilterButton(systemType);
            filterParts();
        }

        function showPartDetails(part, folder) {
            const modal = document.getElementById('part-modal');
            const img = document.getElementById('modal-img');
            const name = document.getElementById('modal-name');
            const category = document.getElementById('modal-category');
            const releasePack = document.getElementById('modal-release-pack');
            const warningDiv = document.getElementById('modal-warning');
            
            name.innerText = part.name;
            category.innerText = part.category.replace('-', ' ');
            img.src = `assets/images/${folder}/${part.image_url || 'default.webp'}`;
            
            // 💡 [수정사항] 모달에 평균 등수 데이터 바인딩
            document.getElementById('modal-pickrate').innerText = `${part.pickRate || 0}%`;
            document.getElementById('modal-avgrank').innerText = part.avgRank ? `${part.avgRank}위` : '-';
            
            if (part.release_pack) {
                releasePack.innerText = part.release_pack;
                releasePack.classList.remove('hidden');
            } else {
                releasePack.classList.add('hidden');
            }

            warningDiv.classList.add('hidden');
            warningDiv.innerHTML = '';
            const st = part.system_type || '';
            if (part.category === 'blade' && st.includes('simple')) {
                warningDiv.className = 'p-3 rounded-lg mb-4 text-sm font-bold bg-orange-100 text-orange-600';
                warningDiv.innerHTML = '⚠️ 심플 래칫만 장착 가능';
                warningDiv.classList.remove('hidden');
            } else if (st.includes('integrated')) {
                warningDiv.className = 'p-3 rounded-lg mb-4 text-sm font-bold bg-red-100 text-red-600';
                warningDiv.innerHTML = '⚠️ 래칫 일체형 비트';
                warningDiv.classList.remove('hidden');
            }

            renderSynergy(part);

            document.body.style.overflow = 'hidden'; 
            document.documentElement.style.overflow = 'hidden';
            modal.classList.remove('hidden');
        }

        function renderSynergy(part) {
            const synergySec = document.getElementById('synergy-section');
            const synergyGrid = document.getElementById('synergy-grid');
            synergyGrid.innerHTML = '';
            
            const colMap = {
                'blade': 'blade_id', 'ratchet': 'ratchet_id', 'bit': 'bit_id',
                'lock-chip': 'lock_chip_id', 'over-blade': 'over_blade_id', 'assist-blade': 'assist_blade_id'
            };
            const targetCol = colMap[part.category];

            const usedTournaments = globalTournaments.filter(t => 
                t.tournament_combos && t.tournament_combos.some(c => c[targetCol] === part.id)
            );

            if (usedTournaments.length === 0) {
                synergyGrid.innerHTML = '<p class="col-span-full text-sm text-gray-400 font-bold py-4">아직 같이 사용된 덱 기록이 없습니다.</p>';
                synergySec.classList.remove('hidden');
                return;
            }

            const counts = { 'blade': {}, 'ratchet': {}, 'bit': {}, 'lock-chip': {}, 'over-blade': {}, 'assist-blade': {} };
            // 💡 [수정사항] 시너지 부품들의 랭크 총합 계산용 객체
            const synergyRanks = { 'blade': {}, 'ratchet': {}, 'bit': {}, 'lock-chip': {}, 'over-blade': {}, 'assist-blade': {} };
            let totalCombosWithPart = 0;

            usedTournaments.forEach(t => {
                t.tournament_combos.forEach(c => {
                    if (c[targetCol] === part.id) {
                        totalCombosWithPart++;
                        Object.entries(colMap).forEach(([cat, col]) => {
                            if (cat !== part.category && c[col]) {
                                counts[cat][c[col]] = (counts[cat][c[col]] || 0) + 1;
                                synergyRanks[cat][c[col]] = (synergyRanks[cat][c[col]] || 0) + c.rank;
                            }
                        });
                    }
                });
            });

            const catNames = {
                'blade': '블레이드', 'ratchet': '래칫', 'bit': '비트',
                'lock-chip': '락칩', 'over-blade': '오버 블레이드', 'assist-blade': '어시스트 블레이드'
            };

            let hasAnyData = false;

            Object.keys(counts).forEach(cat => {
                const partsArr = Object.entries(counts[cat])
                    .sort((a,b) => b[1] - a[1]); 

                if (partsArr.length > 0) {
                    hasAnyData = true;
                    
                    let listHtml = '';
                    partsArr.forEach(([id, count]) => {
                        const pData = allParts[cat].find(x => x.id == id);
                        const pName = pData ? pData.name : 'Unknown';
                        const rate = Math.round((count / totalCombosWithPart) * 100);
                        // 💡 [수정사항] 평균 등수 계산
                        const avgRank = (synergyRanks[cat][id] / count).toFixed(2);
                        
                        listHtml += `
                            <li class="flex justify-between items-center py-2 border-b border-gray-100 last:border-0 hover:bg-indigo-50/50 transition-colors px-1 rounded">
                                <span class="text-xs font-bold text-gray-700 truncate pr-2" title="${pName}">${pName}</span>
                                <div class="flex items-center gap-1.5 flex-shrink-0">
                                    <span class="text-[10px] font-black text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded shadow-sm">${avgRank}위</span>
                                    <span class="text-[10px] font-black text-indigo-600 bg-indigo-50 border border-indigo-100 px-1.5 py-0.5 rounded flex-shrink-0">${rate}%</span>
                                </div>
                            </li>
                        `;
                    });

                    const boxHtml = `
                        <div class="bg-white border border-gray-200 rounded-2xl p-3 md:p-4 flex flex-col h-[250px] shadow-sm">
                            <h5 class="text-[10px] font-black text-indigo-400 uppercase mb-3 tracking-widest border-b border-indigo-100 pb-2">${catNames[cat]}</h5>
                            <ul class="flex-grow overflow-y-auto custom-scrollbar pr-2 space-y-0.5">
                                ${listHtml}
                            </ul>
                        </div>
                    `;
                    synergyGrid.insertAdjacentHTML('beforeend', boxHtml);
                }
            });

            if (!hasAnyData) {
                synergyGrid.innerHTML = '<p class="col-span-full text-sm text-gray-400 font-bold py-4">아직 같이 사용된 덱 기록이 없습니다.</p>';
            }

            synergySec.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('part-modal').classList.add('hidden');
            document.body.style.overflow = ''; 
            document.documentElement.style.overflow = '';
        }

        window.onload = async () => {
            await fetchAllData();
            
            const defaultTab = document.getElementById('default-tab');
            if (defaultTab) {
                defaultTab.classList.add('active-tab', 'text-indigo-600');
                defaultTab.classList.remove('text-gray-500');
            }

            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search'); 

            if (searchQuery) {
                const searchInput = document.getElementById('part-search');
                if (searchInput) {
                    searchInput.value = searchQuery;
                    filterParts(); 
                }
            } else {
                updateSystemFilterBar();
            }
        };

        window.addEventListener('click', (event) => {
            const modal = document.getElementById('part-modal');
            if (event.target === modal) {
                closeModal();
            }
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                const modal = document.getElementById('part-modal');
                if (modal && !modal.classList.contains('hidden')) {
                    closeModal();
                }
            }
        });
    </script>
</body>
