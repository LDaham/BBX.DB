<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEY-DB | 부품 랭킹</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { overflow-y: scroll; }
        nav { height: 64px; }

        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-tab { border-bottom: 3px solid #2563eb; color: #2563eb; }
        .img-container { background-color: #f9fafb; position: relative; overflow: hidden; }
        .img-container img { transition: transform 0.3s ease; }
        .img-container:hover img { transform: scale(1.1); }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-white border-b fixed top-0 left-0 right-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-full flex items-center justify-between">
            <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter hover:opacity-80 transition-opacity flex-shrink-0">
                BEY-DB
            </a>
            <div class="flex space-x-6 md:space-x-10 text-sm font-bold text-gray-600">
                <a href="input.html" class="hover:text-blue-500 transition-colors">데이터 입력</a>
                <a href="ranking.html" class="text-blue-600">랭킹</a>
                <a href="about.html" class="hover:text-blue-500 transition-colors">기타</a>
            </div>
        </div>
    </nav>
    <div class="h-16"></div>

    <main class="max-w-5xl mx-auto p-4 py-8">
        <section class="mb-10">
            <h2 class="text-3xl font-black mb-6">부품 랭킹</h2>
            
            <div class="relative mb-8">
                <input type="text" id="part-search" oninput="filterParts()" placeholder="부품 이름을 입력하세요..." autocomplete="off"
                       class="w-full p-4 pl-12 rounded-2xl border-2 border-gray-200 focus:border-blue-500 outline-none shadow-sm transition-all">
                <i class="fa-solid fa-search absolute left-4 top-5 text-gray-400"></i>
            </div>

            <div class="flex space-x-6 border-b overflow-x-auto whitespace-nowrap no-scrollbar pb-1">
                <button id="default-tab" onclick="setCategory('all')" class="cat-btn pb-3 px-1 font-bold text-gray-500 hover:text-blue-600 transition-all">전체</button>
                <button onclick="setCategory('lock-chip')" class="cat-btn pb-3 px-1 font-bold text-gray-500 hover:text-blue-600 transition-all">락칩</button>
                <button onclick="setCategory('over-blade')" class="cat-btn pb-3 px-1 font-bold text-gray-500 hover:text-blue-600 transition-all">오버 블레이드</button>
                <button onclick="setCategory('blade')" class="cat-btn pb-3 px-1 font-bold text-gray-500 hover:text-blue-600 transition-all">블레이드</button>
                <button onclick="setCategory('assist-blade')" class="cat-btn pb-3 px-1 font-bold text-gray-500 hover:text-blue-600 transition-all">어시스트 블레이드</button>
                <button onclick="setCategory('ratchet')" class="cat-btn pb-3 px-1 font-bold text-gray-500 hover:text-blue-600 transition-all">라쳇</button>
                <button onclick="setCategory('bit')" class="cat-btn pb-3 px-1 font-bold text-gray-500 hover:text-blue-600 transition-all">비트</button>
            </div>
            <div id="filter-container" class="flex justify-between items-center w-full mt-4">
                <div id="system-filter-bar" class="hidden flex-wrap gap-3">
                </div>
                <div class="flex items-center gap-2 ml-auto">
                    <label class="text-sm font-semibold text-gray-600">정렬:</label>
                    <select id="sort-dropdown" onchange="sortParts(this.value)" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none bg-white">
                        <option value="name">이름순</option>
                        <option value="winRate" selected>승률순</option>
                        <option value="samples">표본순</option>
                    </select>
                </div>
            </div>
        </section>

        <div id="parts-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
        </div>
    </main>

    <div id="part-modal" class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg max-h-[90vh] overflow-y-auto rounded-3xl shadow-2xl transform transition-all no-scrollbar">
            <div class="relative h-48 bg-gray-100 flex items-center justify-center p-8">
                <button onclick="closeModal()" class="absolute top-4 right-4 w-10 h-10 bg-white/80 rounded-full flex items-center justify-center hover:bg-white transition-colors shadow-sm z-20">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <img id="modal-img" src="" class="h-full object-contain drop-shadow-xl z-10">
            </div>
            
            <div class="p-6">
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <p id="modal-category" class="text-xs text-blue-500 font-bold uppercase tracking-widest mb-1"></p>
                        <h3 id="modal-name" class="text-2xl font-black"></h3>
                        <div id="modal-method-badge" class="mt-2 h-7 flex flex-wrap gap-1"></div>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-400 font-bold mb-1">SAMPLE</p>
                        <p id="modal-samples" class="text-xl font-black text-gray-800">0</p>
                    </div>
                </div>

                <div id="modal-warning" class="hidden p-3 rounded-lg mb-4 text-sm font-bold"></div>

                <div id="modal-mode-container" class="hidden flex-wrap gap-2 mb-6"></div>

                <div class="mb-8">
                    <div class="flex justify-between mb-2">
                        <span class="text-sm font-bold text-gray-600">Win Rate</span>
                        <span id="modal-winrate-text" class="text-sm font-black text-blue-600">0%</span>
                    </div>
                    <div class="w-full bg-gray-100 h-4 rounded-full overflow-hidden">
                        <div id="modal-winrate-bar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="bg-blue-50 p-4 rounded-2xl w-full">
                        <p class="text-[10px] font-bold text-blue-400 uppercase mb-2">Synergy (추천 조합)</p>
                        <ol id="modal-synergy" class="list-decimal pl-5 text-sm text-blue-900 space-y-1">
                            <li>-</li>
                        </ol>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-green-50 p-4 rounded-2xl">
                        <p class="text-[10px] font-bold text-green-500 uppercase mb-2">상대하기 쉬움</p>
                        <ol id="modal-easy-matchup" class="list-decimal pl-5 text-sm text-green-900 space-y-1">
                            <li>-</li>
                        </ol>
                    </div>
                    <div class="bg-red-50 p-4 rounded-2xl">
                        <p class="text-[10px] font-bold text-red-400 uppercase mb-2">상대하기 어려움</p>
                        <ol id="modal-hard-matchup" class="list-decimal pl-5 text-sm text-red-900 space-y-1">
                            <li>-</li>
                        </ol>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vakhcvoawubesgymsztw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZha2hjdm9hd3ViZXNneW1zenR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODI4NzIsImV4cCI6MjA5MTA1ODg3Mn0.97aUMz-EP7ZBvyDFznB4YUV108SPC5RgOFV9EALXjbU';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const METAL_ID = 85;
        const PLASTIC_ID = 82;
        
        let parts = []; 
        let currentCategory = 'all'; 
        let currentSystemFilter = 'ALL';
        let currentSortCriteria = 'winRate'; 
        let currentPart = null;

        async function fetchParts() {
            const { data: partsData, error: partsError } = await supabaseClient.from('parts').select('*');
            const { data: matchupsData, error: matchupsError } = await supabaseClient.from('matchups').select('*');

            if (partsError || matchupsError) {
                console.error('데이터 로드 실패:', partsError || matchupsError);
                return;
            }

            const stats = calculateStats(matchupsData, partsData);

            partsData.forEach(p => {
                let id = p.id;
                if (p.category === 'lock-chip') {
                    if (p.system_type === 'metal') id = METAL_ID;
                    else if (p.system_type === 'plastic') id = PLASTIC_ID;
                }
                const stat = stats[id];
                
                const winRateNum = stat && stat.samples > 0 ? (stat.totalScore / (stat.samples * 10) * 100) : 0;
                p.winRate = winRateNum.toFixed(1);
                p.sampleCount = stat ? stat.samples : 0;

                // 💡 카드 뱃지 로직: 51% 컷오프 및 다중 뱃지 지원
                let badgeHtml = '';
                if (stat && stat.samples > 0) {
                    const badges = [];
                    const maxPossibleScore = stat.samples * 10; // 전체 판수 × 10 (총 발생 가능 점수)

                    // 1. 승리 공식 검사 (초록 배지)
                    for (let k in stat.winMethods) {
                        const pct = (stat.winMethods[k] / maxPossibleScore) * 100;
                        if (pct >= 51) {
                            badges.push({ type: 'win', name: k, pct: Math.round(pct) });
                        }
                    }

                    // 2. 패배 공식 검사 (빨간 배지)
                    for (let k in stat.lossMethods) {
                        const pct = (stat.lossMethods[k] / maxPossibleScore) * 100;
                        if (pct >= 51) {
                            badges.push({ type: 'loss', name: k, pct: Math.round(pct) });
                        }
                    }

                    // 퍼센트 내림차순 정렬
                    badges.sort((a, b) => b.pct - a.pct);

                    // 뱃지 HTML 생성
                    badges.forEach(b => {
                        const koName = b.name === 'spin' ? '스핀' : b.name === 'burst' ? '버스트' : '오버/익스';
                        if (b.type === 'win') {
                            badgeHtml += `<span class="inline-block bg-green-50 text-green-600 border border-green-100 text-[10px] px-2 py-0.5 rounded-md font-black whitespace-nowrap">${koName} ${b.pct}%</span>`;
                        } else {
                            badgeHtml += `<span class="inline-block bg-red-50 text-red-600 border border-red-100 text-[10px] px-2 py-0.5 rounded-md font-black whitespace-nowrap">${koName} ${b.pct}%</span>`;
                        }
                    });
                }
                
                // 뱃지가 하나도 없다면 HTML은 빈 문자열로 둠 (CSS h-6가 영역 보존)
                p.methodBadgeHtml = badgeHtml;
            });

            parts = partsData;
            renderParts('', 'winRate');
        }

        function calculateStats(matchups, partsList) {
            const stats = {};
            matchups.forEach(m => {
                const isLeftArr = [true, true, true, true, false, false, false, false];
                const ids = [
                    m.left_blade_id, m.left_lock_chip_id, m.left_ratchet_id, m.left_bit_id,
                    m.right_blade_id, m.right_lock_chip_id, m.right_ratchet_id, m.right_bit_id
                ];

                ids.forEach((id, index) => {
                    if (!id) return;
                    let targetId = id;
                    const part = partsList.find(p => p.id === id);
                    if (part && part.category === 'lock-chip') {
                        if (part.system_type === 'metal') targetId = METAL_ID;
                        else if (part.system_type === 'plastic') targetId = PLASTIC_ID;
                    }
                    
                    if (!stats[targetId]) {
                        stats[targetId] = { totalScore: 0, enemyScore: 0, samples: 0, winMethods: {}, lossMethods: {} };
                    }
                    
                    stats[targetId].samples++;
                    const isLeft = isLeftArr[index];
                    
                    const myScore = isLeft ? m.win_rate_left : m.win_rate_right;
                    const enemyScore = isLeft ? m.win_rate_right : m.win_rate_left;
                    
                    stats[targetId].totalScore += myScore; 
                    stats[targetId].enemyScore += enemyScore;

                    const myMethods = isLeft ? m.win_method_left : m.win_method_right;
                    const enemyMethods = isLeft ? m.win_method_right : m.win_method_left;

                    // 이긴 경기에서는 해당 공식에 myScore 누적
                    if (myMethods && myScore > 0) {
                        myMethods.forEach(x => stats[targetId].winMethods[x] = (stats[targetId].winMethods[x] || 0) + myScore);
                    }
                    // 진 경기에서는 해당 공식에 enemyScore 누적
                    if (enemyMethods && enemyScore > 0) {
                        enemyMethods.forEach(x => stats[targetId].lossMethods[x] = (stats[targetId].lossMethods[x] || 0) + enemyScore);
                    }
                });
            });
            return stats;
        }

        function renderParts(filterText = '', sortCriteria = 'name') {
            const grid = document.getElementById('parts-grid');
            if (!grid) return;
            grid.innerHTML = '';

            let filtered = parts.filter(p => {
                const matchesCategory = (currentCategory === 'all') || (p.category === currentCategory);
                const matchesSearch = p.name.toLowerCase().includes(filterText.toLowerCase());
                const matchesSystem = (currentCategory === 'all') || matchSystemFilter(p);
                return matchesCategory && matchesSearch && matchesSystem;
            });

            if (sortCriteria === 'name') {
                filtered.sort((a, b) => a.name.localeCompare(b.name, 'ko-KR'));
            } else if (sortCriteria === 'winRate') {
                filtered.sort((a, b) => {
                    if (a.sampleCount === 0 && b.sampleCount > 0) return 1;
                    if (b.sampleCount === 0 && a.sampleCount > 0) return -1;
                    return parseFloat(b.winRate) - parseFloat(a.winRate);
                });
            } else if (sortCriteria === 'samples') {
                filtered.sort((a, b) => b.sampleCount - a.sampleCount);
            }

            if (filtered.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-gray-400">등록된 부품이 없습니다.</p>`;
                return;
            }

            filtered.forEach(p => {
                const imgFileName = p.image_url || 'default.webp'; 
                const imgPath = `assets/images/parts/${p.category}/${imgFileName}`;
                const modeBadge = p.has_mode ? `<span class="absolute top-2 right-2 bg-yellow-400 text-[10px] px-2 py-0.5 rounded-full font-black text-white shadow-sm z-10">MODE</span>` : '';
                const systemBadge = getSystemBadge(p.system_type);

                const card = document.createElement('div');
                card.className = "relative bg-white p-4 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md hover:scale-105 transition-all cursor-pointer text-center flex flex-col items-center group";
                
                card.innerHTML = `
                    ${modeBadge}
                    ${systemBadge}
                    <div class="w-full aspect-square img-container rounded-xl mb-3 flex items-center justify-center">
                        <img src="${imgPath}" alt="${p.name}" class="w-full h-full object-contain p-2" onerror="this.onerror=null; this.src='https://placehold.co/200?text=No+Image';">
                    </div>
                    
                    <p class="text-[10px] text-blue-500 font-bold mb-1 uppercase tracking-tighter">${p.category.replace('-', ' ')}</p>
                    <h4 class="font-black text-sm text-gray-800 truncate w-full">${p.name}</h4>
                    
                    <div class="h-6 mt-1 mb-1 flex items-center justify-center flex-wrap gap-1 w-full">
                        ${p.methodBadgeHtml}
                    </div>
                `;

                card.onclick = () => showPartDetails(p);
                grid.appendChild(card);
            });
        }

        function sortParts(criteria) {
            currentSortCriteria = criteria;
            filterParts();
        }

        function filterParts() {
            const searchInput = document.getElementById('part-search');
            renderParts(searchInput.value, currentSortCriteria);
        }

        function getSystemBadge(systemType) {
            if (!systemType) return '';
            const type = systemType.toLowerCase();
            const badges = [];
            if (type === 'cx-ex') {
                badges.push('<span class="absolute top-2 left-2 bg-green-500 text-[10px] px-2 py-0.5 rounded-full font-black text-white shadow-sm z-10">CX</span>');
                badges.push('<span class="absolute top-2 right-2 bg-red-500 text-[10px] px-2 py-0.5 rounded-full font-black text-white shadow-sm z-10">EX</span>');
                return badges.join('');
            } else if (type.includes('bx')) {
                return '<span class="absolute top-2 left-2 bg-blue-500 text-[10px] px-2 py-0.5 rounded-full font-black text-white shadow-sm z-10">BX</span>';
            } else if (type.includes('ux')) {
                return '<span class="absolute top-2 left-2 bg-purple-500 text-[10px] px-2 py-0.5 rounded-full font-black text-white shadow-sm z-10">UX</span>';
            } else if (type.includes('cx')) {
                return '<span class="absolute top-2 left-2 bg-green-500 text-[10px] px-2 py-0.5 rounded-full font-black text-white shadow-sm z-10">CX</span>';
            } else if (type === 'simple') {
                return '<span class="absolute top-2 left-2 bg-orange-500 text-[10px] px-2 py-0.5 rounded-full font-black text-white shadow-sm z-10">SIMPLE</span>';
            } else if (type === 'metal') {
                return '<span class="absolute top-2 left-2 bg-gray-400 text-[10px] px-2 py-0.5 rounded-full font-black text-white shadow-sm z-10">METAL</span>';
            } else if (type === 'plastic') {
                return '<span class="absolute top-2 left-2 bg-blue-500 text-[10px] px-2 py-0.5 rounded-full font-black text-white shadow-sm z-10">PLASTIC</span>';
            } else if (type === 'integrated') {
                return '<span class="absolute top-2 left-2 bg-green-500 text-[10px] px-2 py-0.5 rounded-full font-black text-white shadow-sm z-10">INTEGRATED</span>';
            }
            return '';
        }

        function setCategory(cat) {
            currentCategory = cat;
            currentSystemFilter = 'ALL';
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('active-tab', 'text-blue-600');
                btn.classList.add('text-gray-500');
            });
            if (window.event && window.event.currentTarget) {
                window.event.currentTarget.classList.add('active-tab', 'text-blue-600');
                window.event.currentTarget.classList.remove('text-gray-500');
            }
            updateSystemFilterBar();
            filterParts();
        }

        function updateSystemFilterBar() {
            const bar = document.getElementById('system-filter-bar');
            if (!bar) return;
            bar.innerHTML = '';
            if (currentCategory === 'blade') {
                bar.appendChild(createFilterBtn('ALL'));
                bar.appendChild(createFilterBtn('BX'));
                bar.appendChild(createFilterBtn('UX'));
                bar.appendChild(createFilterBtn('CX'));
                bar.appendChild(createFilterBtn('EX'));
                bar.appendChild(createFilterBtn('MODE'));
                bar.classList.remove('hidden');
                bar.classList.add('flex');
            } else if (currentCategory === 'lock-chip') {
                bar.appendChild(createFilterBtn('ALL'));
                bar.appendChild(createFilterBtn('METAL'));
                bar.appendChild(createFilterBtn('PLASTIC'));
                bar.classList.remove('hidden');
                bar.classList.add('flex');
            } else if (currentCategory === 'ratchet') {
                bar.appendChild(createFilterBtn('ALL'));
                bar.appendChild(createFilterBtn('SIMPLE'));
                bar.appendChild(createFilterBtn('STANDARD'));
                bar.classList.remove('hidden');
                bar.classList.add('flex');
            } else if (currentCategory === 'bit') {
                bar.appendChild(createFilterBtn('ALL'));
                bar.appendChild(createFilterBtn('INTEGRATED'));
                bar.appendChild(createFilterBtn('STANDARD'));
                bar.classList.remove('hidden');
                bar.classList.add('flex');
            } else {
                bar.classList.add('hidden');
                bar.classList.remove('flex');
            }
            highlightSystemFilterButton('ALL');
        }

        function createFilterBtn(label) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.onclick = () => filterBySystem(label);
            btn.className = 'system-filter-btn rounded-full border border-gray-200 bg-white px-4 py-2 text-sm font-semibold text-gray-600 transition-all hover:border-blue-300 hover:text-blue-700';
            btn.textContent = label;
            return btn;
        }

        function highlightSystemFilterButton(systemType) {
            const buttons = document.querySelectorAll('#system-filter-bar button');
            buttons.forEach(btn => {
                if (btn.innerText === systemType) {
                    btn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                    btn.classList.remove('text-gray-600', 'bg-white');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                    btn.classList.add('text-gray-600', 'bg-white');
                }
            });
        }

        function matchSystemFilter(part) {
            const type = (part.system_type || '').toLowerCase();
            if (currentCategory === 'blade') {
                switch (currentSystemFilter) {
                    case 'BX': return type.includes('bx');
                    case 'UX': return type.includes('ux');
                    case 'CX': return type.includes('cx');
                    case 'EX': return type === 'cx-ex';
                    case 'MODE': return part.has_mode === true;
                    default: return true;
                }
            } else if (currentCategory === 'lock-chip') {
                switch (currentSystemFilter) {
                    case 'METAL': return type === 'metal';
                    case 'PLASTIC': return type === 'plastic';
                    default: return true;
                }
            } else if (currentCategory === 'ratchet') {
                switch (currentSystemFilter) {
                    case 'SIMPLE': return type === 'simple';
                    case 'STANDARD': return type !== 'simple' || !type;
                    default: return true;
                }
            } else if (currentCategory === 'bit') {
                switch (currentSystemFilter) {
                    case 'INTEGRATED': return type === 'integrated';
                    case 'STANDARD': return type !== 'integrated' || !type;
                    default: return true;
                }
            }
            return true;
        }

        function filterBySystem(systemType) {
            currentSystemFilter = systemType;
            highlightSystemFilterButton(systemType);
            filterParts();
        }

        async function showPartDetails(part) {
            currentPart = part;
            const modal = document.getElementById('part-modal');
            const img = document.getElementById('modal-img');
            const name = document.getElementById('modal-name');
            const category = document.getElementById('modal-category');
            const modeContainer = document.getElementById('modal-mode-container');
            const warningDiv = document.getElementById('modal-warning');

            name.innerText = part.category === 'lock-chip' ? 
                (part.system_type === 'metal' ? '메탈 락칩 통합 통계' : '플라스틱 락칩 통합 통계') : 
                part.name;
            category.innerText = part.category.replace('-', ' ');
            img.src = `assets/images/parts/${part.category}/${part.image_url || 'default.webp'}`;
            
            warningDiv.classList.add('hidden');
            warningDiv.innerHTML = '';
            
            if (part.category === 'blade' && (part.system_type === 'ux-simple' || part.name === '클락 미라주')) {
                warningDiv.className = 'p-3 rounded-lg mb-4 text-sm font-bold bg-orange-100 text-orange-600';
                warningDiv.innerHTML = '⚠️ 심플 라쳇만 장착 가능';
                warningDiv.classList.remove('hidden');
            } else if (part.system_type === 'integrated') {
                warningDiv.className = 'p-3 rounded-lg mb-4 text-sm font-bold bg-red-100 text-red-600';
                warningDiv.innerHTML = '⚠️ 라쳇 일체형 비트';
                warningDiv.classList.remove('hidden');
            }
            
            modal.classList.remove('hidden');

            if (part.has_mode && part.mode_types) {
                modeContainer.innerHTML = '';
                modeContainer.appendChild(createModeBtn('Overall', null)); 
                part.mode_types.forEach(mode => {
                    modeContainer.appendChild(createModeBtn(mode, mode));
                });
                modeContainer.classList.remove('hidden');
                modeContainer.classList.add('flex');
            } else {
                modeContainer.classList.add('hidden');
                modeContainer.classList.remove('flex');
                modeContainer.innerHTML = '';
            }

            fetchStats(null);
        }

        function createModeBtn(label, modeValue) {
            const btn = document.createElement('button');
            btn.innerText = label;
            btn.className = "mode-select-btn px-4 py-2 rounded-xl text-xs font-bold border-2 transition-all " + 
                            (modeValue === null ? "border-blue-500 bg-blue-500 text-white" : "border-gray-200 text-gray-500 hover:border-blue-200");
            
            btn.onclick = (e) => {
                document.querySelectorAll('.mode-select-btn').forEach(b => {
                    b.classList.remove('border-blue-500', 'bg-blue-500', 'text-white');
                    b.classList.add('border-gray-200', 'text-gray-500');
                });
                e.target.classList.remove('border-gray-200', 'text-gray-500');
                e.target.classList.add('border-blue-500', 'bg-blue-500', 'text-white');
                fetchStats(modeValue);
            };
            return btn;
        }

        async function fetchStats(selectedMode) {
            const samplesEl = document.getElementById('modal-samples');
            const wrText = document.getElementById('modal-winrate-text');
            const wrBar = document.getElementById('modal-winrate-bar');
            const badgeEl = document.getElementById('modal-method-badge');

            samplesEl.innerText = "...";
            badgeEl.innerHTML = "";

            let targetId = currentPart.id;
            if (currentPart.category === 'lock-chip') {
                if (currentPart.system_type === 'metal') targetId = METAL_ID;
                else if (currentPart.system_type === 'plastic') targetId = PLASTIC_ID;
            }
            let query = supabaseClient.from('matchups').select('*');
            query = query.or(`left_lock_chip_id.eq.${targetId},left_blade_id.eq.${targetId},left_ratchet_id.eq.${targetId},left_bit_id.eq.${targetId},right_lock_chip_id.eq.${targetId},right_blade_id.eq.${targetId},right_ratchet_id.eq.${targetId},right_bit_id.eq.${targetId}`);

            const { data: matches, error } = await query;

            const resetLists = () => {
                document.getElementById('modal-synergy').innerHTML = '<li>데이터 부족</li>';
                document.getElementById('modal-easy-matchup').innerHTML = '<li>데이터 부족</li>';
                document.getElementById('modal-hard-matchup').innerHTML = '<li>데이터 부족</li>';
            }

            if (error || !matches || matches.length === 0) {
                samplesEl.innerText = "0";
                wrText.innerText = "0.0%";
                wrBar.style.width = "0%";
                resetLists();
                return;
            }

            let filteredMatches = matches;
            if (selectedMode) {
                filteredMatches = matches.filter(m => {
                    const isLeft = [m.left_lock_chip_id, m.left_blade_id, m.left_ratchet_id, m.left_bit_id].includes(targetId);
                    const modes = isLeft ? m.left_bey_modes : m.right_bey_modes;
                    return modes && modes[currentPart.category] === selectedMode;
                });
            }

            if (filteredMatches.length === 0) {
                samplesEl.innerText = "0";
                wrText.innerText = "0.0%";
                wrBar.style.width = "0%";
                resetLists();
                return;
            }

            let totalScore = 0;
            const synergyStats = {};
            const matchupStats = {}; 
            
            let winMethods = { spin: 0, burst: 0, over: 0 }; 
            let lossMethods = { spin: 0, burst: 0, over: 0 };

            filteredMatches.forEach(m => {
                const isLeft = [m.left_lock_chip_id, m.left_blade_id, m.left_ratchet_id, m.left_bit_id].includes(targetId);
                
                const myScore = isLeft ? m.win_rate_left : m.win_rate_right;
                const enemyScore = isLeft ? m.win_rate_right : m.win_rate_left;
                
                totalScore += myScore;

                const myMethods = isLeft ? m.win_method_left : m.win_method_right;
                const enemyMethods = isLeft ? m.win_method_right : m.win_method_left;

                if (myMethods && myScore > 0) myMethods.forEach(x => winMethods[x] += myScore);
                if (enemyMethods && enemyScore > 0) enemyMethods.forEach(x => lossMethods[x] += enemyScore);

                const myTeamIds = isLeft ? 
                    [m.left_lock_chip_id, m.left_blade_id, m.left_ratchet_id, m.left_bit_id] : 
                    [m.right_lock_chip_id, m.right_blade_id, m.right_ratchet_id, m.right_bit_id];
                
                const enemyTeamIds = isLeft ? 
                    [m.right_lock_chip_id, m.right_blade_id, m.right_ratchet_id, m.right_bit_id] : 
                    [m.left_lock_chip_id, m.left_blade_id, m.left_ratchet_id, m.left_bit_id];

                const unifyId = (id) => {
                    if (!id) return null;
                    const p = parts.find(x => x.id === id);
                    if (p && p.category === 'lock-chip') {
                        return (p.system_type === 'metal') ? METAL_ID : PLASTIC_ID;
                    }
                    return id;
                };

                myTeamIds.forEach(id => {
                    const realId = unifyId(id);
                    if (!realId || realId === targetId) return; 
                    if (!synergyStats[realId]) synergyStats[realId] = { matches: 0, score: 0 };
                    synergyStats[realId].matches++;
                    synergyStats[realId].score += myScore;
                });

                enemyTeamIds.forEach(id => {
                    const realId = unifyId(id);
                    if (!realId) return;
                    if (!matchupStats[realId]) matchupStats[realId] = { matches: 0, myScore: 0 };
                    matchupStats[realId].matches++;
                    matchupStats[realId].myScore += myScore;
                });
            });

            const winRate = ((totalScore / (filteredMatches.length * 10)) * 100).toFixed(1);
            samplesEl.innerText = filteredMatches.length;
            wrText.innerText = `${winRate}%`;
            wrBar.style.width = `${winRate}%`;

            // 💡 모달 창 배지 (51% 이상 컷오프 적용)
            let modalBadgeHtml = '';
            const badges = [];
            const maxPossibleScore = filteredMatches.length * 10;

            for (let k in winMethods) {
                const pct = (winMethods[k] / maxPossibleScore) * 100;
                if (pct >= 51) badges.push({ type: 'win', name: k, pct: Math.round(pct) });
            }
            for (let k in lossMethods) {
                const pct = (lossMethods[k] / maxPossibleScore) * 100;
                if (pct >= 51) badges.push({ type: 'loss', name: k, pct: Math.round(pct) });
            }

            badges.sort((a, b) => b.pct - a.pct);

            badges.forEach(b => {
                const koName = b.name === 'spin' ? '스핀' : b.name === 'burst' ? '버스트' : '오버/익스';
                if (b.type === 'win') {
                    modalBadgeHtml += `<span class="inline-block bg-green-50 text-green-600 border border-green-100 text-[11px] px-2 py-1 rounded-md font-bold">${koName} ${b.pct}%</span>`;
                } else {
                    modalBadgeHtml += `<span class="inline-block bg-red-50 text-red-600 border border-red-100 text-[11px] px-2 py-1 rounded-md font-bold">${koName} ${b.pct}%</span>`;
                }
            });
            
            badgeEl.innerHTML = modalBadgeHtml; // 비어있으면 투명한 h-7 공간만 유지됨

            const renderList = (arr, elementId, colorClass) => {
                const el = document.getElementById(elementId);
                el.innerHTML = '';
                if (arr.length === 0) {
                    el.innerHTML = '<li>데이터 부족</li>';
                    return;
                }
                arr.forEach(item => {
                    const p = parts.find(x => x.id === item.id);
                    const name = p ? (p.category === 'lock-chip' ? (p.system_type === 'metal' ? '메탈 락칩' : '플라스틱 락칩') : p.name) : '알 수 없음';
                    el.innerHTML += `<li>${name} <span class="text-[10px] ${colorClass} font-bold ml-1">(${item.wr.toFixed(1)}%)</span></li>`;
                });
            };

            const synergyArr = Object.keys(synergyStats).map(id => {
                const s = synergyStats[id];
                return { id: parseInt(id), wr: (s.score / (s.matches * 10)) * 100, matches: s.matches };
            }).filter(item => item.matches >= 1).sort((a, b) => b.wr - a.wr).slice(0, 5);
            
            renderList(synergyArr, 'modal-synergy', 'text-blue-500');

            const matchupArr = Object.keys(matchupStats).map(id => {
                const s = matchupStats[id];
                return { id: parseInt(id), wr: (s.myScore / (s.matches * 10)) * 100, matches: s.matches };
            }).filter(item => item.matches >= 1);

            const easyArr = [...matchupArr]
                .filter(item => item.wr >= 50)
                .sort((a, b) => b.wr - a.wr)
                .slice(0, 5);
            renderList(easyArr, 'modal-easy-matchup', 'text-green-600');

            const hardArr = [...matchupArr]
                .filter(item => item.wr <= 50)
                .sort((a, b) => a.wr - b.wr)
                .slice(0, 5);
            renderList(hardArr, 'modal-hard-matchup', 'text-red-500');
        }

        function closeModal() {
            document.getElementById('part-modal').classList.add('hidden');
            currentPart = null;
        }

        window.onload = () => {
            fetchParts();
            const defaultTab = document.getElementById('default-tab');
            if (defaultTab) {
                defaultTab.classList.add('active-tab', 'text-blue-600');
                defaultTab.classList.remove('text-gray-500');
            }
        };

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                const modal = document.getElementById('part-modal');
                if (!modal.classList.contains('hidden')) {
                    closeModal();
                }
            }
        });
    </script>
</body>
