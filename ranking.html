<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>BEY-DB | 메타 랭킹</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { max-width: 100vw; overflow-x: hidden; }
        nav { height: 64px; }
        .filter-active { background-color: #eab308 !important; color: white !important; border-color: #eab308 !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex flex-col min-h-screen">
    <nav class="bg-white border-b fixed top-0 left-0 right-0 z-50 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 h-full flex items-center justify-between">
            <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter hover:opacity-80 transition-opacity flex-shrink-0 mr-4">
                BEY-DB
            </a>
            
            <button id="mobile-menu-btn" onclick="toggleMenu()" class="md:hidden text-gray-600 hover:text-blue-600 focus:outline-none p-2 transition-colors ml-auto">
                <i class="fa-solid fa-bars text-2xl"></i>
            </button>

            <div id="nav-links" class="hidden absolute top-[64px] left-0 right-0 bg-white border-b border-gray-100 shadow-lg flex-row items-center py-4 px-4 space-x-6 overflow-x-auto no-scrollbar md:static md:flex md:flex-row md:border-none md:shadow-none md:py-0 md:space-x-6 lg:space-x-10 text-sm font-bold text-gray-600 w-full md:w-auto z-40">
                <a href="ranking.html" class="text-indigo-600 border-b-2 border-indigo-600 pb-1 whitespace-nowrap">메타 랭킹</a>
                <a href="tournament.html" class="hover:text-blue-500 transition-colors whitespace-nowrap">대회 기록</a>
                <a href="map.html" class="hover:text-blue-500 transition-colors whitespace-nowrap">관계도</a>
                <a href="encyclopedia.html" class="hover:text-blue-500 transition-colors whitespace-nowrap">도감</a>
                <a href="lab.html" class="hover:text-blue-500 transition-colors whitespace-nowrap">실험실</a>
            </div>
        </div>
    </nav>
    <div class="h-16"></div>

    <main class="max-w-5xl mx-auto p-4 py-8 flex-grow w-full">
        <section class="mb-8 text-center md:text-left">
            <h2 class="text-3xl font-black mb-2 text-gray-800"><i class="fa-solid fa-chart-line text-yellow-500 mr-2"></i> 메타 랭킹</h2>
            <p class="text-gray-500 text-sm">입상 플레이어들이 가장 신뢰하는 부품들을 순위별로 확인하세요.</p>
        </section>

        <section class="mb-8 bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col gap-6">
            <div class="flex flex-col lg:flex-row gap-6 items-start lg:items-center justify-between">
                <div class="flex flex-wrap gap-6">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">대회 성격</label>
                        <div class="flex bg-gray-100 rounded-xl p-1">
                            <button onclick="setFilter('ranked', 'ALL')" id="filter-ranked-ALL" class="px-4 py-1.5 text-xs font-bold rounded-lg text-gray-500 filter-active transition-all">전체</button>
                            <button onclick="setFilter('ranked', 'TRUE')" id="filter-ranked-TRUE" class="px-4 py-1.5 text-xs font-bold rounded-lg text-gray-500 transition-all">Ranked</button>
                            <button onclick="setFilter('ranked', 'FALSE')" id="filter-ranked-FALSE" class="px-4 py-1.5 text-xs font-bold rounded-lg text-gray-500 transition-all">Unranked</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">매치 타입</label>
                        <div class="flex bg-gray-100 rounded-xl p-1">
                            <button onclick="setFilter('type', 'ALL')" id="filter-type-ALL" class="px-4 py-1.5 text-xs font-bold rounded-lg text-gray-500 filter-active transition-all">전체</button>
                            <button onclick="setFilter('type', 1)" id="filter-type-1" class="px-4 py-1.5 text-xs font-bold rounded-lg text-gray-500 transition-all">3on3</button>
                            <button onclick="setFilter('type', 2)" id="filter-type-2" class="px-4 py-1.5 text-xs font-bold rounded-lg text-gray-500 transition-all">1on1</button>
                        </div>
                    </div>
                </div>
                
                <div class="flex gap-4 w-full lg:w-auto">
                    <div class="flex-1 lg:w-48 relative" id="stadium-dropdown-container">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">스타디움</label>
                        <button onclick="toggleDropdown('stadium')" id="stadium-dropdown-btn" class="w-full p-3 bg-gray-50 border border-gray-100 rounded-2xl text-xs font-bold flex justify-between items-center">
                            <span id="stadium-selected-text">모든 스타디움</span>
                            <i class="fa-solid fa-chevron-down text-gray-400"></i>
                        </button>
                        <div id="stadium-dropdown-list" class="absolute top-full mt-2 w-full bg-white border border-gray-100 rounded-2xl shadow-xl z-50 hidden flex-col overflow-hidden">
                            <button onclick="selectDropdown('stadium', 'ALL', '모든 스타디움')" class="text-left px-4 py-3 text-xs font-bold hover:bg-yellow-50">모든 스타디움</button>
                            <button onclick="selectDropdown('stadium', 1, '타카라 익스트림')" class="text-left px-4 py-3 text-xs font-bold hover:bg-yellow-50">타카라 익스트림</button>
                            <button onclick="selectDropdown('stadium', 2, '해즈브로 익스트림')" class="text-left px-4 py-3 text-xs font-bold hover:bg-yellow-50">해즈브로 익스트림</button>
                        </div>
                    </div>
                    <div class="lg:w-32 relative" id="sort-dropdown-container">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">정렬</label>
                        <button onclick="toggleDropdown('sort')" id="sort-dropdown-btn" class="w-full p-3 bg-gray-50 border border-gray-100 rounded-2xl text-xs font-bold flex justify-between items-center">
                            <span id="sort-selected-text">최신순</span>
                            <i class="fa-solid fa-sort text-gray-400"></i>
                        </button>
                        <div id="sort-dropdown-list" class="absolute top-full mt-2 w-full bg-white border border-gray-100 rounded-2xl shadow-xl z-50 hidden flex-col overflow-hidden">
                            <button onclick="selectDropdown('sort', 'desc', '최신순')" class="text-left px-4 py-3 text-xs font-bold hover:bg-yellow-50">최신순</button>
                            <button onclick="selectDropdown('sort', 'asc', '오래된순')" class="text-left px-4 py-3 text-xs font-bold hover:bg-yellow-50">오래된순</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-4">
                <h3 class="text-xl font-black text-gray-800 flex items-center gap-2 px-2 mb-6"><i class="fa-solid fa-compact-disc text-purple-500"></i> 블레이드</h3>
                <div id="rank-blade" class="space-y-3"></div>
            </div>
            <div class="space-y-4">
                <h3 class="text-xl font-black text-gray-800 flex items-center gap-2 px-2 mb-6"><i class="fa-solid fa-gear text-blue-500"></i> 래칫</h3>
                <div id="rank-ratchet" class="space-y-3"></div>
            </div>
            <div class="space-y-4">
                <h3 class="text-xl font-black text-gray-800 flex items-center gap-2 px-2 mb-6"><i class="fa-solid fa-caret-down text-emerald-500"></i> 비트</h3>
                <div id="rank-bit" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://rzcprbfaxgxtggjghbds.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_E6wmdZuRD5Xe3dzLwt_KCw_FZl0Y4YJ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allData = [];
        let filters = { ranked: 'ALL', type: 'ALL' };

        async function init() {
            const { data } = await supabaseClient.from('tournaments').select(`is_ranked, match_type, tournament_combos (rank, blades(name, image_url), ratchets(name, image_url), bits(name, image_url))`);
            allData = data || [];
            render();
        }

        function render() {
            const filtered = allData.filter(t => {
                if (filters.ranked !== 'ALL' && String(t.is_ranked).toUpperCase() !== filters.ranked) return false;
                if (filters.type !== 'ALL' && t.match_type !== filters.type) return false;
                return true;
            });

            const counts = { blade: {}, ratchet: {}, bit: {} };
            const names = { blade: {}, ratchet: {}, bit: {} };
            const imgs = { blade: {}, ratchet: {}, bit: {} };
            let totalPlayers = 0;

            filtered.forEach(t => {
                totalPlayers += new Set(t.tournament_combos.map(c => c.rank)).size;
                t.tournament_combos.forEach(c => {
                    ['blade', 'ratchet', 'bit'].forEach(type => {
                        const p = c[type+'s'];
                        if (p) {
                            counts[type][p.name] = (counts[type][p.name] || 0) + 1;
                            imgs[type][p.name] = p.image_url;
                        }
                    });
                });
            });

            ['blade', 'ratchet', 'bit'].forEach(type => {
                const list = document.getElementById('rank-'+type);
                list.innerHTML = '';
                const sorted = Object.entries(counts[type]).sort((a,b) => b[1] - a[1]);
                
                sorted.forEach(([name, count], i) => {
                    const rate = Math.round((count / totalPlayers) * 100);
                    const folder = type === 'blade' ? 'blades' : type === 'ratchet' ? 'ratchets' : 'bits';
                    list.insertAdjacentHTML('beforeend', `
                        <div class="flex items-center p-4 bg-white rounded-3xl border border-gray-100 shadow-sm hover:border-yellow-400 transition-all">
                            <span class="w-8 font-black text-gray-300 text-lg">${i+1}</span>
                            <img src="assets/images/${folder}/${imgs[type][name] || 'default.webp'}" class="w-14 h-14 object-contain mx-3">
                            <div class="flex-grow">
                                <p class="font-black text-sm text-gray-800">${name}</p>
                                <p class="text-[10px] font-bold text-gray-400">${count} 픽</p>
                            </div>
                            <div class="text-right"><p class="text-lg font-black text-yellow-600">${rate}%</p></div>
                        </div>`);
                });
            });
        }

        function setFilter(k, v) { 
            filters[k] = v; 
            document.querySelectorAll(`[id^="filter-${k}-"]`).forEach(b => b.classList.remove('filter-active'));
            document.getElementById(`filter-${k}-${v}`).classList.add('filter-active');
            render(); 
        }
        window.onload = init;
    </script>
</body>
</html>
