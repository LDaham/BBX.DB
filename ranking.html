    <script>
        const SUPABASE_URL = 'https://rzcprbfaxgxtggjghbds.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_E6wmdZuRD5Xe3dzLwt_KCw_FZl0Y4YJ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allData = [];
        let filteredTournaments = []; 
        
        let filters = { startWeek: 4, endWeek: 1, ranked: 'TRUE', type: 1, stadium: 1 };
        
        // 💡 [수정1] 기본 OFF로 설정
        let isWeightEnabled = false;
        
        const PARTS_TYPES = ['blade', 'ratchet', 'bit', 'assist_blade', 'lock_chip', 'over_blade'];
        let aggregatedStats = {};

        const catNameKor = {
            'blade': '블레이드', 'ratchet': '래칫', 'bit': '비트',
            'assist_blade': '어시스트 블레이드', 'lock_chip': '락칩', 'over_blade': '오버 블레이드'
        };

        function toggleMenu() {
            const navLinks = document.getElementById('nav-links');
            const menuBtnIcon = document.querySelector('#mobile-menu-btn i');
            navLinks.classList.toggle('hidden'); navLinks.classList.toggle('flex');
            menuBtnIcon.classList.toggle('fa-bars'); menuBtnIcon.classList.toggle('fa-xmark');
        }

        function toggleDropdown(id) { 
            event.stopPropagation();
            const list = document.getElementById(`${id}-list`) || document.getElementById(`${id}-dropdown-list`);
            if (list) {
                list.classList.toggle('hidden'); 
                list.classList.toggle('flex');
            }
        }

        function initWeekDropdowns() {
            ['ranking-start', 'ranking-end'].forEach(id => {
                const listEl = document.getElementById(`${id}-list`);
                if(!listEl) return;
                listEl.innerHTML = '';
                for(let i=12; i>=1; i--) {
                    const text = i === 1 ? '최근 1주' : `${i}주 전`;
                    const btn = document.createElement('button');
                    btn.className = 'text-left px-3 py-2 text-xs font-bold text-gray-700 hover:bg-blue-50 hover:text-blue-600 border-b border-gray-50 last:border-0 w-full';
                    btn.innerText = text;
                    btn.onclick = () => selectWeekFilter(id, i, text);
                    listEl.appendChild(btn);
                }
            });
        }

        function selectWeekFilter(id, val, text) {
            document.getElementById(`${id}-text`).innerText = text;
            document.getElementById(`${id}-list`).classList.add('hidden');
            document.getElementById(`${id}-list`).classList.remove('flex');

            if(id === 'ranking-start') filters.startWeek = val;
            if(id === 'ranking-end') filters.endWeek = val;

            if (filters.startWeek < filters.endWeek) {
                filters.endWeek = filters.startWeek;
                document.getElementById('ranking-end-text').innerText = filters.endWeek === 1 ? '최근 1주' : `${filters.endWeek}주 전`;
            }
            aggregateData();
        }

        function selectGlobalFilter(key, val, text) {
            filters[key] = val;
            document.getElementById(`filter-${key}-text`).innerText = text;
            const list = document.getElementById(`filter-${key}-list`);
            if(list) {
                list.classList.add('hidden');
                list.classList.remove('flex');
            }
            aggregateData();
        }

        function toggleWeight() {
            isWeightEnabled = document.getElementById('weight-toggle').checked;
            aggregateData(); 
        }

        function selectMobilePart(part, text) {
            document.getElementById('mobile-part-selected-text').innerText = text;
            const list = document.getElementById('mobile-part-dropdown-list');
            if(list) {
                list.classList.add('hidden');
                list.classList.remove('flex');
            }
            
            PARTS_TYPES.forEach(t => {
                const container = document.getElementById(`container-${t}`);
                if (t === part) {
                    container.classList.remove('hidden');
                    container.classList.add('block');
                } else {
                    container.classList.remove('block');
                    container.classList.add('hidden');
                }
            });
        }

        document.addEventListener('click', (e) => {
            ['ranking-start', 'ranking-end', 'filter-ranked', 'filter-type', 'filter-stadium'].forEach(id => {
                const container = document.getElementById(`${id}-container`);
                const list = document.getElementById(`${id}-list`);
                if (container && !container.contains(e.target) && list) {
                    list.classList.add('hidden'); list.classList.remove('flex');
                }
            });
            ['mobile-part'].forEach(id => {
                const container = document.getElementById(`${id}-dropdown-container`);
                const list = document.getElementById(`${id}-dropdown-list`);
                if (container && !container.contains(e.target) && list) {
                    list.classList.add('hidden'); list.classList.remove('flex');
                }
            });
            
            const modal = document.getElementById('part-modal');
            if (e.target === modal) {
                closeModal();
            }
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                const modal = document.getElementById('part-modal');
                if (modal && !modal.classList.contains('hidden')) {
                    closeModal();
                }
            }
        });

        async function init() {
            const { data } = await supabaseClient.from('tournaments').select(`
                date, is_ranked, match_type, stadium, 
                tournament_combos (
                    rank, 
                    blades(name, image_url), ratchets(name, image_url), bits(name, image_url),
                    lock_chips(name, image_url), over_blades(name, image_url), assist_blades(name, image_url)
                )
            `);
            allData = data || [];
            initWeekDropdowns(); 
            aggregateData();
        }

        function aggregateData() {
            let referenceDate = new Date();
            if (allData.length > 0) {
                const latestTime = Math.max(...allData.map(t => new Date(t.date).getTime()));
                referenceDate = new Date(latestTime);
            }
            referenceDate.setHours(0, 0, 0, 0); 

            filteredTournaments = allData.filter(t => {
                if (filters.ranked !== 'ALL' && String(t.is_ranked).toUpperCase() !== filters.ranked) return false;
                if (filters.type !== 'ALL' && t.match_type !== parseInt(filters.type)) return false;
                if (filters.stadium !== 'ALL' && t.stadium !== parseInt(filters.stadium)) return false;
                
                const tDate = new Date(t.date);
                tDate.setHours(0, 0, 0, 0);
                
                const diffTime = referenceDate.getTime() - tDate.getTime();
                const diffWeeks = Math.floor(diffTime / (1000 * 60 * 60 * 24 * 7)) + 1;
                
                return diffWeeks >= filters.endWeek && diffWeeks <= filters.startWeek;
            });

            const counts = {}; 
            const pureCounts = {}; 
            const imgs = {};
            PARTS_TYPES.forEach(t => { counts[t] = {}; pureCounts[t] = {}; imgs[t] = {}; });
            
            let totalPlayers = 0;

            filteredTournaments.forEach(t => {
                totalPlayers += new Set(t.tournament_combos.map(c => c.rank)).size;
                
                t.tournament_combos.forEach(c => {
                    let rankValue = isWeightEnabled ? c.rank : 1; 

                    PARTS_TYPES.forEach(type => {
                        const p = c[type + 's'];
                        if (p) {
                            counts[type][p.name] = (counts[type][p.name] || 0) + rankValue; 
                            pureCounts[type][p.name] = (pureCounts[type][p.name] || 0) + 1; 
                            imgs[type][p.name] = p.image_url;
                        }
                    });
                });
            });

            PARTS_TYPES.forEach(type => {
                const validParts = Object.entries(counts[type]).filter(([name, score]) => {
                    if (totalPlayers === 0) return false;
                    
                    // 💡 [수정] 평균 등수(ON)일 때만 픽률 5% 초과만 보여주고, OFF일 때는 조건 없이 모두 표시
                    if (isWeightEnabled) {
                        const pureCount = pureCounts[type][name];
                        const pickRate = (pureCount / totalPlayers) * 100;
                        return pickRate > 5;
                    } else {
                        return true; 
                    }
                });

                const sorted = validParts.sort((a, b) => {
                    if (isWeightEnabled) {
                        const avgA = a[1] / pureCounts[type][a[0]];
                        const avgB = b[1] / pureCounts[type][b[0]];
                        return avgA - avgB; 
                    } else {
                        return b[1] - a[1]; 
                    }
                });
                
                aggregatedStats[type] = sorted.map(([name, score]) => {
                    const pureCount = pureCounts[type][name];
                    
                    let rateValue = isWeightEnabled 
                        ? (score / pureCount).toFixed(2) 
                        : Math.round((pureCount / totalPlayers) * 100) + '%'; 

                    return { 
                        name, 
                        score, 
                        pureCount, 
                        img: imgs[type][name], 
                        displayRate: rateValue 
                    };
                });
                
                renderList(type);
            });
        }

        function renderList(type) {
            const listContainer = document.getElementById('rank-' + type);
            listContainer.innerHTML = '';
            
            const dataList = aggregatedStats[type];
            if (dataList.length === 0) {
                listContainer.innerHTML = '<div class="p-6 bg-white rounded-3xl border border-gray-100 text-center text-xs font-bold text-gray-400 shadow-sm">해당 기간의 데이터가 없습니다</div>';
                return;
            }

            const rateLabel = isWeightEnabled ? '평균 등수' : '픽률';
            const rateUnit = isWeightEnabled ? '위' : '';

            dataList.forEach((item, index) => {
                const rank = index + 1;
                const safeName = item.name.replace(/'/g, "\\'");
                const imgSrc = item.img || 'default.webp';
                
                let badge = `<span class="w-8 h-8 flex items-center justify-center bg-gray-100 text-gray-500 font-black rounded-lg text-sm flex-shrink-0">${rank}</span>`;

                listContainer.insertAdjacentHTML('beforeend', `
                    <div onclick="showPartDetails('${type}', '${safeName}', '${imgSrc}', '${item.displayRate}${rateUnit}')" class="cursor-pointer flex items-center p-4 bg-white rounded-3xl border border-gray-100 shadow-sm hover:border-blue-400 hover:shadow-md transition-all mr-1 relative overflow-hidden group">
                        ${isWeightEnabled && rank <= 3 ? `<div class="absolute -left-2 top-0 bottom-0 w-3 bg-blue-500 opacity-20"></div>` : ''}
                        ${badge}
                        <img src="assets/images/${type}s/${imgSrc}" class="w-14 h-14 md:w-16 md:h-16 object-contain mx-3 drop-shadow-sm flex-shrink-0 group-hover:scale-105 transition-transform">
                        <div class="flex-grow min-w-0">
                            <p class="font-black text-sm md:text-sm text-gray-800 truncate">${item.name}</p>
                            <p class="text-[10px] md:text-xs font-bold text-gray-400 mt-0.5">표본 ${item.pureCount}회</p>
                        </div>
                        <div class="text-right flex-shrink-0 ml-2 flex flex-col items-end">
                            <span class="text-[8px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">${rateLabel}</span>
                            <p class="text-lg md:text-xl font-black text-blue-600 leading-none">${item.displayRate}${rateUnit}</p>
                        </div>
                    </div>`);
            });
        }

        function showPartDetails(type, name, imgFileName, displayRate) {
            const modal = document.getElementById('part-modal');
            
            document.getElementById('modal-category').innerText = catNameKor[type] || type;
            document.getElementById('modal-name').innerText = name;
            document.getElementById('modal-img').src = `assets/images/${type}s/${imgFileName}`;
            
            document.getElementById('modal-score-label').innerText = isWeightEnabled ? "평균 등수" : "선택 기간 픽률";
            document.getElementById('modal-pickrate').innerText = displayRate;
            
            renderSynergy(type, name);

            document.body.style.overflow = 'hidden'; 
            document.documentElement.style.overflow = 'hidden';
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('part-modal').classList.add('hidden');
            document.body.style.overflow = ''; 
            document.documentElement.style.overflow = '';
        }

        function renderSynergy(targetType, targetName) {
            const synergyGrid = document.getElementById('synergy-grid');
            synergyGrid.innerHTML = '';
            
            let totalCombosWithPart = 0;
            const counts = { 'blade': {}, 'ratchet': {}, 'bit': {}, 'assist_blade': {}, 'lock_chip': {}, 'over_blade': {} };
            // 💡 [수정3] 시너지 모달창에서 평균 등수를 구하기 위해 함께 쓰였을 때의 등수 합을 저장할 객체
            const synergyRanks = { 'blade': {}, 'ratchet': {}, 'bit': {}, 'assist_blade': {}, 'lock_chip': {}, 'over_blade': {} };

            filteredTournaments.forEach(t => {
                t.tournament_combos.forEach(c => {
                    const partObj = c[targetType + 's'];
                    if (partObj && partObj.name === targetName) {
                        totalCombosWithPart++;
                        
                        PARTS_TYPES.forEach(cat => {
                            if (cat !== targetType && c[cat + 's']) {
                                const pName = c[cat + 's'].name;
                                counts[cat][pName] = (counts[cat][pName] || 0) + 1;
                                // 💡 같이 쓰인 콤보의 실제 등수를 누적 합산
                                synergyRanks[cat][pName] = (synergyRanks[cat][pName] || 0) + c.rank;
                            }
                        });
                    }
                });
            });

            let hasAnyData = false;

            PARTS_TYPES.forEach(cat => {
                if (cat === targetType) return; 
                
                const partsArr = Object.entries(counts[cat]).sort((a,b) => b[1] - a[1]);

                if (partsArr.length > 0) {
                    hasAnyData = true;
                    let listHtml = '';
                    partsArr.forEach(([pName, count]) => {
                        const rate = Math.round((count / totalCombosWithPart) * 100);
                        // 💡 [수정3] 같이 쓰였을 때의 평균 등수 계산
                        const avgRank = (synergyRanks[cat][pName] / count).toFixed(2);
                        
                        // 💡 UI에 평균 등수 배지 추가
                        listHtml += `
                            <li class="flex justify-between items-center py-2 border-b border-gray-100 last:border-0 hover:bg-blue-50/50 transition-colors px-1 rounded">
                                <span class="text-xs font-bold text-gray-700 truncate pr-2" title="${pName}">${pName}</span>
                                <div class="flex items-center gap-1.5 flex-shrink-0">
                                    <span class="text-[10px] font-black text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded shadow-sm">${avgRank}위</span>
                                    <span class="text-[10px] font-black text-blue-600 bg-blue-50 border border-blue-100 px-1.5 py-0.5 rounded shadow-sm">${rate}%</span>
                                </div>
                            </li>
                        `;
                    });

                    const boxHtml = `
                        <div class="bg-white border border-gray-200 rounded-2xl p-3 flex flex-col h-[200px] shadow-sm">
                            <h5 class="text-[10px] font-black text-blue-400 uppercase mb-2 tracking-widest border-b border-blue-100 pb-2">${catNameKor[cat]}</h5>
                            <ul class="flex-grow overflow-y-auto custom-scrollbar pr-1 space-y-0.5">
                                ${listHtml}
                            </ul>
                        </div>
                    `;
                    synergyGrid.insertAdjacentHTML('beforeend', boxHtml);
                }
            });

            if (!hasAnyData) {
                synergyGrid.innerHTML = '<p class="col-span-full text-sm text-gray-400 font-bold py-4">시너지 데이터가 없습니다.</p>';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
