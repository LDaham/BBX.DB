<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEY-DB | 준비 중</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { overflow-y: scroll; }
        nav { height: 64px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex flex-col min-h-screen">

    <nav class="bg-white/95 backdrop-blur-md border-b border-gray-200 fixed top-0 left-0 right-0 z-50 shadow-md">
        <div class="max-w-5xl mx-auto px-4 h-full flex items-center justify-between">
            <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter hover:opacity-80 transition-opacity flex-shrink-0 mr-4">
                BEY-DB
            </a>
            
            <button id="mobile-menu-btn" onclick="toggleMenu()" class="md:hidden text-gray-600 hover:text-blue-600 focus:outline-none p-2 transition-colors ml-auto">
                <i class="fa-solid fa-bars text-2xl"></i>
            </button>

            <div id="nav-links" class="hidden absolute top-[64px] left-0 right-0 bg-white/95 backdrop-blur-md border-b border-gray-200 shadow-xl flex-row items-center py-4 px-4 space-x-6 overflow-x-auto no-scrollbar md:static md:flex md:flex-row md:border-none md:bg-transparent md:shadow-none md:py-0 md:space-x-6 lg:space-x-10 text-sm font-bold text-gray-600 w-full md:w-auto z-40">
                <a href="ranking.html" class="hover:text-blue-500 transition-colors whitespace-nowrap">입상 랭킹</a>
                <a href="tournament.html" class="hover:text-blue-500 transition-colors whitespace-nowrap">대회 기록</a>
                <a href="map.html" class="hover:text-blue-500 transition-colors whitespace-nowrap">연구소</a>
                <a href="encyclopedia.html" class="hover:text-blue-500 transition-colors whitespace-nowrap">도감</a>
                <a href="lab.html" class="text-blue-600 border-b-2 border-blue-600 pb-1 whitespace-nowrap">실험실</a>
            </div>
        </div>
    </nav>
    <div class="h-16"></div>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="max-w-lg w-full bg-white p-10 rounded-3xl shadow-lg border border-gray-100 text-center relative overflow-hidden">
            
            <div class="absolute -top-10 -right-10 text-gray-50 opacity-50">
                <i class="fa-solid fa-gear text-9xl animate-[spin_10s_linear_infinite]"></i>
            </div>
            <div class="absolute -bottom-10 -left-10 text-gray-50 opacity-50">
                <i class="fa-solid fa-wrench text-9xl"></i>
            </div>

            <div class="relative z-10">
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fa-solid fa-person-digging text-4xl text-blue-500"></i>
                </div>
                <h2 class="text-3xl font-black text-gray-800 mb-3">페이지 준비 중입니다</h2>
                <p class="text-gray-500 mb-8 leading-relaxed">
                    더 나은 BEY-DB를 위해 해당 기능을 개발중에 있습니다.<br>
                </p>

                <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-8"></div>

                <div class="bg-gray-50 p-5 rounded-2xl border border-gray-100">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Feedback & Ideas</p>
                    <p class="text-sm text-gray-600 mb-5 font-medium">기능 건의나 오류 제보는 언제든 환영합니다.</p>
                    
                    <a href="https://github.com/LDaham/BBX.DB/issues" target="_blank" rel="noopener noreferrer" 
                       class="inline-flex items-center justify-center w-full gap-2 bg-gray-900 text-white font-black py-3 px-6 rounded-xl hover:bg-gray-800 transition-all shadow-md active:scale-95">
                        <i class="fa-brands fa-github text-xl"></i>
                        GitHub 이슈에 제보하기
                    </a>
                </div>
                
                <div class="mt-6">
                    <a href="index.html" class="text-sm font-bold text-blue-500 hover:text-blue-700 underline underline-offset-4">
                        홈으로 돌아가기
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white py-10 px-4 border-t mt-auto">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 text-gray-400">
            <div class="text-center md:text-left">
                <h2 class="text-xl font-black tracking-tighter text-gray-300">BEY-DB</h2>
                <p class="text-[10px] mt-1 uppercase tracking-widest font-bold">Collective Intelligence Project</p>
            </div>
            <div class="flex gap-6 text-xs font-bold uppercase tracking-wider">
                <a href="https://github.com/LDaham/BBX.DB" target="_blank" class="hover:text-gray-800 transition-colors"><i class="fa-brands fa-github text-lg"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // 💡 모바일 햄버거 메뉴 토글 함수
        function toggleMenu() {
            const navLinks = document.getElementById('nav-links');
            const menuBtnIcon = document.querySelector('#mobile-menu-btn i');
            
            if (navLinks.classList.contains('hidden')) {
                navLinks.classList.remove('hidden');
                navLinks.classList.add('flex');
                menuBtnIcon.classList.remove('fa-bars');
                menuBtnIcon.classList.add('fa-xmark');
            } else {
                navLinks.classList.add('hidden');
                navLinks.classList.remove('flex');
                menuBtnIcon.classList.remove('fa-xmark');
                menuBtnIcon.classList.add('fa-bars');
            }
        }
    </script>
</body>
</html>
