<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEY-DB | 데이터 입력</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 네비게이션 및 레이아웃 안정화 */
        html { overflow-y: scroll; }
        nav { height: 64px; }
        .hidden-field { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 💡 커스텀 다이나믹 슬라이더 스타일 */
        #win-slider {
            /* 초기 색상: 50% 파랑, 50% 빨강 */
            background: linear-gradient(to right, #3b82f6 50%, #ef4444 50%);
        }
        input[type=range]::-webkit-slider-runnable-track { 
            background: transparent; 
            height: 16px; 
            border-radius: 99px; 
        }
        input[type=range]::-webkit-slider-thumb { 
            appearance: none;
            width: 28px;
            height: 28px;
            background: #ffffff;
            border: 3px solid #f3f4f6;
            border-radius: 50%;
            margin-top: -6px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            cursor: grab;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active {
            cursor: grabbing;
            transform: scale(1.1);
        }
    </style>
</head>

                    </label>

<script>
    const SUPABASE_URL = 'https://vakhcvoawubesgymsztw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZha2hjdm9hd3ViZXNneW1zenR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODI4NzIsImV4cCI6MjA5MTA1ODg3Mn0.97aUMz-EP7ZBvyDFznB4YUV108SPC5RgOFV9EALXjbU';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allParts = []; 

    async function init() {
        const { data, error } = await supabaseClient.from('parts').select('*');
        if (error) return console.error(error);
        allParts = data;

        setupCustomSearchUI();
        randomizeLeftBey();
        updateSlider(5); // 슬라이더 초기 색상 세팅
    }

    function setupCustomSearchUI() {
        const sides = ['left', 'right'];
        const categories = ['blade', 'lock-chip', 'over-blade', 'assist-blade', 'ratchet', 'bit'];

        sides.forEach(side => {
            categories.forEach(cat => {
                const input = document.getElementById(`${side}-${cat}-input`);
                if (input) {
                    input.parentElement.classList.add('relative');

                    const resultsDiv = document.createElement('div');
                    resultsDiv.id = `${side}-${cat}-results`;
                    resultsDiv.className = 'absolute top-[calc(100%+4px)] left-0 right-0 bg-white border border-blue-100 rounded-xl shadow-xl z-[60] hidden max-h-60 overflow-y-auto no-scrollbar';

                    input.insertAdjacentElement('afterend', resultsDiv);

                    input.addEventListener('input', () => handleSearchCustom(side, cat, false));
                    input.addEventListener('focus', () => handleSearchCustom(side, cat, false));
                    input.addEventListener('click', (e) => {
                        e.stopPropagation();
                        handleSearchCustom(side, cat, false);
                    });
                }
            });
        });
    }

    function handleSearchCustom(side, cat, forceShowAll = false) {
        const input = document.getElementById(`${side}-${cat}-input`);
        const query = input.value.toLowerCase();
        const resultsDiv = document.getElementById(`${side}-${cat}-results`);

        const allResults = document.querySelectorAll('[id$="-results"]');
        allResults.forEach(div => div.classList.add('hidden'));

        let filtered = [];

        if (cat === 'lock-chip') {
            resultsDiv.innerHTML = '';
            const metalChip = allParts.find(p => p.category === 'lock-chip' && p.system_type === 'metal');
            const plasticChip = allParts.find(p => p.category === 'lock-chip' && p.system_type === 'plastic');

            if (metalChip) {
                const div = document.createElement('div');
                div.className = 'p-2 hover:bg-blue-50 cursor-pointer';
                div.textContent = '메탈 락칩';
                div.onclick = () => selectPartCustom(side, cat, metalChip.id, '메탈 락칩');
                resultsDiv.appendChild(div);
            }

            if (plasticChip) {
                const div = document.createElement('div');
                div.className = 'p-2 hover:bg-blue-50 cursor-pointer';
                div.textContent = '플라스틱 락칩';
                div.onclick = () => selectPartCustom(side, cat, plasticChip.id, '플라스틱 락칩');
                resultsDiv.appendChild(div);
            }

            resultsDiv.classList.remove('hidden');
            resultsDiv.scrollTop = 0;
            return;
        } else {
            filtered = allParts.filter(p => p.category === cat);

            const bladeId = document.getElementById(`${side}-blade-id`).value;
            const blade = allParts.find(p => p.id == bladeId);

            if (cat === 'ratchet' && blade && blade.system_type.includes('simple')) {
                filtered = filtered.filter(p => p.system_type === 'simple');
            }

            if (cat === 'bit' && blade && blade.system_type.includes('simple')) {
                filtered = filtered.filter(p => p.system_type !== 'integrated');
            }

            if (!forceShowAll) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(query));
            }

            filtered.sort((a, b) => a.name.localeCompare(b.name, 'ko-KR'));
        }

        resultsDiv.innerHTML = '';
        if (filtered.length > 0) {
            filtered.forEach(part => {
                const div = document.createElement('div');
                div.className = 'p-2 hover:bg-blue-50 cursor-pointer font-bold text-gray-700';
                div.textContent = part.name;
                div.onclick = () => selectPartCustom(side, cat, part.id, part.name);
                resultsDiv.appendChild(div);
            });
            resultsDiv.classList.remove('hidden');
            resultsDiv.scrollTop = 0;
        } else {
            resultsDiv.classList.add('hidden');
        }
    }

    function selectPartCustom(side, cat, id, name) {
        const input = document.getElementById(`${side}-${cat}-input`);
        const hidden = document.getElementById(`${side}-${cat}-id`);
        const resultsDiv = document.getElementById(`${side}-${cat}-results`);

        input.value = name;
        hidden.value = id;
        resultsDiv.classList.add('hidden');

        const part = allParts.find(p => p.id == id);

        if (cat === 'blade') {
            updateUI(side, part.system_type);
            checkRatchetRestriction(side, part);
        }

        if (cat === 'bit') {
            checkIntegratedBit(side, part);
        }
    }

    document.addEventListener('click', (e) => {
        const results = document.querySelectorAll('[id$="-results"]');
        results.forEach(div => {
            if (!div.contains(e.target) && !e.target.matches('[id$="-input"]')) {
                div.classList.add('hidden');
            }
        });
    });

    function updateUI(side, system) {
        const cxArea = document.getElementById(`${side}-cx-area`);
        
        const lockChipInput = document.getElementById(`${side}-lock-chip-input`);
        const lockChipId = document.getElementById(`${side}-lock-chip-id`);
        
        const overBladeInput = document.getElementById(`${side}-over-blade-input`);
        const overBladeId = document.getElementById(`${side}-over-blade-id`);
        
        const assistBladeInput = document.getElementById(`${side}-assist-blade-input`);
        const assistBladeId = document.getElementById(`${side}-assist-blade-id`);
        
        if (system && system.includes('cx')) {
            cxArea.classList.remove('hidden-field');
            if (system === 'cx-ex') {
                overBladeInput.classList.remove('hidden-field');
            } else {
                overBladeInput.classList.add('hidden-field');
                overBladeInput.value = '';
                overBladeId.value = '';
            }
        } else {
            cxArea.classList.add('hidden-field');
            
            lockChipInput.value = '';
            lockChipId.value = '';
            
            assistBladeInput.value = '';
            assistBladeId.value = '';
            
            overBladeInput.value = '';
            overBladeId.value = '';
        }
    }

    function checkRatchetRestriction(side, blade) {
        const ratchetInput = document.getElementById(`${side}-ratchet-input`);
        const ratchetHidden = document.getElementById(`${side}-ratchet-id`);
        
        if (blade.system_type.includes('simple')) {
            ratchetInput.placeholder = "심플 라쳇만 선택 가능";
            const currentRatchet = allParts.find(p => p.id == ratchetHidden.value);
            if (currentRatchet && currentRatchet.system_type !== 'simple') {
                ratchetInput.value = "";
                ratchetHidden.value = "";
            }
        } else {
            if (ratchetInput.placeholder === "심플 라쳇만 선택 가능") {
                 ratchetInput.placeholder = "라쳇 검색...";
            }
        }
    }

    function checkIntegratedBit(side, bit) {
        const ratchetInput = document.getElementById(`${side}-ratchet-input`);
        const ratchetHidden = document.getElementById(`${side}-ratchet-id`);

        if (bit.system_type === 'integrated') {
            ratchetInput.value = "일체형 (선택 불가)";
            ratchetHidden.value = "";
            ratchetInput.disabled = true;
            ratchetInput.classList.add('bg-gray-200', 'text-gray-400');
        } else {
            if (ratchetInput.disabled) {
                ratchetInput.value = "";
                ratchetInput.disabled = false;
                ratchetInput.classList.remove('bg-gray-200', 'text-gray-400');
                ratchetInput.placeholder = "라쳇 검색...";
            }
        }
    }

    function randomizeLeftBey() {
        const getRand = (cat, filterFn = null) => {
            let filtered = allParts.filter(p => p.category === cat);
            if (filterFn) filtered = filtered.filter(filterFn);
            return filtered[Math.floor(Math.random() * filtered.length)];
        };

        const blade = getRand('blade');
        setVal('left', 'blade', blade);
        updateUI('left', blade.system_type);

        const bit = getRand('bit', (p) => {
            if (blade.system_type.includes('simple')) return p.system_type !== 'integrated';
            return true;
        });
        setVal('left', 'bit', bit);
        checkIntegratedBit('left', bit);

        if (bit.system_type !== 'integrated') {
            const ratchet = getRand('ratchet', (p) => {
                if (blade.system_type.includes('simple')) return p.system_type === 'simple';
                return true;
            });
            setVal('left', 'ratchet', ratchet);
        } else {
            document.getElementById('left-ratchet-input').value = "일체형 (선택 불가)";
            document.getElementById('left-ratchet-id').value = "";
        }

        if (blade.system_type && blade.system_type.includes('cx')) {
            const randomLockChip = getRand('lock-chip');
            if (randomLockChip) {
                if (randomLockChip.system_type === 'metal') {
                    const metalPart = allParts.find(p => p.category === 'lock-chip' && p.system_type === 'metal');
                    if (metalPart) setVal('left', 'lock-chip', { id: metalPart.id, name: '메탈 락칩' });
                } else {
                    const plasticPart = allParts.find(p => p.category === 'lock-chip' && p.system_type === 'plastic');
                    if (plasticPart) setVal('left', 'lock-chip', { id: plasticPart.id, name: '플라스틱 락칩' });
                }
            }
            setVal('left', 'assist-blade', getRand('assist-blade'));
            if (blade.system_type === 'cx-ex') setVal('left', 'over-blade', getRand('over-blade'));
        }
    }

    function setVal(side, cat, part) {
        const input = document.getElementById(`${side}-${cat}-input`);
        const hidden = document.getElementById(`${side}-${cat}-id`);
        if(input && part) {
            input.value = part.name;
            hidden.value = part.id;
        }
    }

    // 💡 슬라이더 드래그 시 색상이 채워지도록 스크립트 고도화
    function updateSlider(val) {
        // val은 Left(Blue)가 차지하는 비율을 의미 (0~10)
        // 화면 표시는 직관적으로 10점 만점 분배
        document.getElementById('win-left').innerText = val;
        document.getElementById('win-right').innerText = 10 - val;
        
        // 슬라이더 배경(트랙) 동적 그라데이션 조절
        const slider = document.getElementById('win-slider');
        const percentage = val * 10;
        
        // 왼쪽은 파란색, 오른쪽은 빨간색으로 채워짐
        slider.style.background = `linear-gradient(to right, #3b82f6 ${percentage}%, #ef4444 ${percentage}%)`;
    }

    async function submitMatchData() {
        const submitBtn = document.querySelector('button[onclick="submitMatchData()"]');
        submitBtn.disabled = true;
        submitBtn.innerText = "전송 중...";

        try {
            const getVal = (id) => {
                const val = document.getElementById(id).value;
                return val ? parseInt(val) : null;
            };

            const getMethods = (name) => {
                return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`))
                            .map(el => el.value);
            };

            const checkIdIntegrity = (side, cat) => {
                const inputText = document.getElementById(`${side}-${cat}-input`).value.trim();
                const inputId = document.getElementById(`${side}-${cat}-id`).value;

                if (cat === 'lock-chip') {
                    if (inputText === '메탈 락칩') {
                        const metalPart = allParts.find(p => p.category === 'lock-chip' && p.system_type === 'metal');
                        if (metalPart) {
                            document.getElementById(`${side}-${cat}-id`).value = metalPart.id;
                            return true;
                        }
                    } else if (inputText === '플라스틱 락칩') {
                        const plasticPart = allParts.find(p => p.category === 'lock-chip' && p.system_type === 'plastic');
                        if (plasticPart) {
                            document.getElementById(`${side}-${cat}-id`).value = plasticPart.id;
                            return true;
                        }
                    }
                }

                if (inputText !== "" && inputText !== "일체형 (선택 불가)" && !inputId) {
                    return false;
                }
                return true;
            };

            const categories = ['blade', 'lock-chip', 'over-blade', 'assist-blade', 'ratchet', 'bit'];
            for (const side of ['left', 'right']) {
                for (const cat of categories) {
                    if (!checkIdIntegrity(side, cat)) {
                        const msg = `${side === 'left' ? '왼쪽' : '오른쪽'} ${cat} 입력이 올바르지 않습니다. 리스트에서 선택해 주세요.`;
                        alert(msg);
                        throw new Error(msg);
                    }
                }
            }

            const matchPayload = {
                left_blade_id: getVal('left-blade-id'),
                left_lock_chip_id: getVal('left-lock-chip-id'),
                left_over_blade_id: getVal('left-over-blade-id'),
                left_assist_blade_id: getVal('left-assist-blade-id'),
                left_ratchet_id: getVal('left-ratchet-id'),
                left_bit_id: getVal('left-bit-id'),
                win_method_left: getMethods('win_method_left'),

                right_blade_id: getVal('right-blade-id'),
                right_lock_chip_id: getVal('right-lock-chip-id'),
                right_over_blade_id: getVal('right-over-blade-id'),
                right_assist_blade_id: getVal('right-assist-blade-id'),
                right_ratchet_id: getVal('right-ratchet-id'),
                right_bit_id: getVal('right-bit-id'),
                win_method_right: getMethods('win_method_right'),

                win_rate_left: parseInt(document.getElementById('win-left').innerText),
                win_rate_right: parseInt(document.getElementById('win-right').innerText),
                created_at: new Date().toISOString()
            };

            if (!matchPayload.left_blade_id || !matchPayload.right_blade_id) {
                alert("양쪽 베이의 블레이드를 모두 선택해 주세요!");
                throw new Error("Missing essential parts");
            }

            const validateSystemLogic = (side) => {
                const bId = matchPayload[`${side}_blade_id`];
                const rId = matchPayload[`${side}_ratchet_id`];
                const btId = matchPayload[`${side}_bit_id`];

                const blade = allParts.find(p => p.id === bId);
                const ratchet = allParts.find(p => p.id === rId);
                const bit = allParts.find(p => p.id === btId);

                if (blade && blade.system_type.includes('simple')) {
                    if (!ratchet || ratchet.system_type !== 'simple') {
                        return `${side === 'left' ? '왼쪽' : '오른쪽'} 베이: 클락 미라주는 심플 라쳇만 장착할 수 있습니다.`;
                    }
                    if (bit && bit.system_type === 'integrated') {
                        return `${side === 'left' ? '왼쪽' : '오른쪽'} 베이: 클락 미라주는 일체형 비트를 사용할 수 없습니다.`;
                    }
                }

                if (bit && bit.system_type === 'integrated' && rId !== null) {
                    return `${side === 'left' ? '왼쪽' : '오른쪽'} 베이: 일체형 비트는 별도의 라쳇을 장착할 수 없습니다.`;
                }

                return null;
            };

            const leftError = validateSystemLogic('left');
            if (leftError) { alert(leftError); throw new Error(leftError); }

            const rightError = validateSystemLogic('right');
            if (rightError) { alert(rightError); throw new Error(rightError); }

            const { data, error } = await supabaseClient.from('matchups').insert([matchPayload]);
            if (error) throw error;

            alert('🔥 데이터 기록 완료!');
            location.reload();

        } catch (err) {
            console.error('제출 중단:', err.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "데이터 제출";
        }
    }

    init();
</script>
</body>
</html>
