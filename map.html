    <script>
        const SUPABASE_URL = 'https://rzcprbfaxgxtggjghbds.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_E6wmdZuRD5Xe3dzLwt_KCw_FZl0Y4YJ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allTournaments = [];
        let trendChart = null;
        let miniCharts = []; // 미니 차트 추적 배열 (메모리 누수 방지)
        let currentCategory = 'blade';
        
        let filters = { ranked: 'ALL', type: 'ALL', stadium: 'ALL' };
        const chartColors = ['#2563eb', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316'];

        function toggleMenu() {
            const navLinks = document.getElementById('nav-links');
            const menuBtnIcon = document.querySelector('#mobile-menu-btn i');
            navLinks.classList.toggle('hidden'); navLinks.classList.toggle('flex');
            menuBtnIcon.classList.toggle('fa-bars'); menuBtnIcon.classList.toggle('fa-xmark');
        }

        function toggleDropdown(id) { 
            event.stopPropagation();
            document.getElementById(`${id}-dropdown-list`).classList.toggle('hidden'); 
            document.getElementById(`${id}-dropdown-list`).classList.toggle('flex');
        }

        function selectDropdown(id, val, text) { 
            filters[id] = val; 
            document.getElementById(`${id}-selected-text`).innerText = text; 
            document.getElementById(`${id}-dropdown-list`).classList.add('hidden');
            document.getElementById(`${id}-dropdown-list`).classList.remove('flex');
            drawChart();
        }

        function setFilter(k, v) { 
            filters[k] = v; 
            document.querySelectorAll(`[id^="filter-${k}-"]`).forEach(b => b.classList.remove('filter-active'));
            document.getElementById(`filter-${k}-${v}`).classList.add('filter-active');
            drawChart();
        }

        document.addEventListener('click', (e) => {
            const container = document.getElementById(`stadium-dropdown-container`);
            const list = document.getElementById(`stadium-dropdown-list`);
            if (container && !container.contains(e.target) && list) {
                list.classList.add('hidden'); list.classList.remove('flex');
            }
        });

        function changeCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.className = 'category-btn bg-gray-100 text-gray-500 hover:bg-gray-200 px-4 py-2 rounded-xl text-xs font-bold transition-all';
            });
            const activeBtn = document.getElementById(`btn-cat-${category}`);
            activeBtn.className = 'category-btn bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm';
            
            drawChart();
        }

        async function initData() {
            try {
                const { data } = await supabaseClient.from('tournaments').select(`
                    date, is_ranked, match_type, stadium,
                    tournament_combos (
                        rank, 
                        blades(name), ratchets(name), bits(name),
                        lock_chips(name), over_blades(name), assist_blades(name)
                    )
                `);

                if (!data || data.length === 0) throw new Error("Data fetch failed");
                allTournaments = data;
                drawChart();
            } catch (err) {
                console.error(err);
                document.getElementById('loading-overlay').innerHTML = '<p class="text-red-500 font-bold">데이터 로드에 실패했습니다.</p>';
            }
        }

        // 피어슨 상관계수(Correlation) 계산 함수
        function getPearsonCorrelation(x, y) {
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, sumY2 = 0;
            let n = 0;
            for (let i = 0; i < x.length; i++) {
                if (x[i] !== null && y[i] !== null) { // null(경기가 없는 주) 제외
                    sumX += x[i]; sumY += y[i];
                    sumXY += x[i] * y[i];
                    sumX2 += x[i] * x[i]; sumY2 += y[i] * y[i];
                    n++;
                }
            }
            if (n < 3) return 0; // 최소 3번 이상 겹치는 데이터가 없으면 무시
            const denominator = Math.sqrt((n * sumX2 - sumX * sumX) * (n * sumY2 - sumY * sumY));
            if (denominator === 0) return 0;
            return (n * sumXY - sumX * sumY) / denominator;
        }

        function drawChart() {
            document.getElementById('loading-overlay').classList.remove('hidden');

            const filteredData = allTournaments.filter(t => {
                if (filters.ranked !== 'ALL' && String(t.is_ranked).toUpperCase() !== filters.ranked) return false;
                if (filters.type !== 'ALL' && t.match_type !== parseInt(filters.type)) return false;
                if (filters.stadium !== 'ALL' && t.stadium !== parseInt(filters.stadium)) return false;
                return true;
            });

            if (filteredData.length === 0) {
                if (trendChart) trendChart.destroy();
                miniCharts.forEach(c => c.destroy());
                miniCharts = [];
                document.getElementById('correlation-charts-container').innerHTML = '<p class="text-xs text-gray-400">데이터가 없습니다.</p>';
                document.getElementById('loading-overlay').classList.add('hidden');
                return;
            }

            const latestTime = Math.max(...filteredData.map(t => new Date(t.date).getTime()));
            const latestDate = new Date(latestTime);
            latestDate.setHours(0, 0, 0, 0);

            // 💡 [수정사항 1] 1주 단위로 16개 구간 생성
            const PERIODS = 16; 
            const periodData = Array.from({length: PERIODS}, () => ({ totalPlayers: 0, parts: {} }));
            const overallPartCounts = {};

            filteredData.forEach(t => {
                const tDate = new Date(t.date);
                tDate.setHours(0, 0, 0, 0);
                
                const diffTime = latestDate.getTime() - tDate.getTime();
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                
                const periodIndex = Math.floor(diffDays / 7); // 7일(1주) 단위
                
                if (periodIndex < PERIODS) {
                    const players = new Set(t.tournament_combos.map(c => c.rank)).size;
                    periodData[periodIndex].totalPlayers += players;

                    t.tournament_combos.forEach(c => {
                        const part = c[currentCategory + 's'];
                        if (part && part.name) {
                            const name = part.name;
                            periodData[periodIndex].parts[name] = (periodData[periodIndex].parts[name] || 0) + 1;
                            overallPartCounts[name] = (overallPartCounts[name] || 0) + 1;
                        }
                    });
                }
            });

            // 전체 기간 누적 사용량 기준 Top 10 부품 추출 (상관관계 분석용)
            const top10Parts = Object.entries(overallPartCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10)
                .map(entry => entry[0]);

            // 메인 그래프용으로는 Top 5만 추출 (그래프 복잡도 방지)
            const top5Parts = top10Parts.slice(0, 5);

            // 💡 X축 라벨: 16주~최근1주
            const labels = Array.from({length: PERIODS}, (_, i) => i === 0 ? '최근 1주' : `${i+1}주 전`).reverse();

            // 부품별 시계열 데이터(16개) 생성
            const partSeriesMap = {};
            top10Parts.forEach(partName => {
                const dataPoints = [];
                for(let i = PERIODS - 1; i >= 0; i--) {
                    const group = periodData[i];
                    if (group.totalPlayers === 0) {
                        dataPoints.push(null); 
                    } else {
                        const count = group.parts[partName] || 0;
                        dataPoints.push(Math.round((count / group.totalPlayers) * 100));
                    }
                }
                partSeriesMap[partName] = dataPoints;
            });

            // 1. 메인 꺾은선 차트 그리기 (Top 5)
            const datasets = top5Parts.map((partName, index) => {
                return {
                    label: partName,
                    data: partSeriesMap[partName],
                    borderColor: chartColors[index % chartColors.length],
                    backgroundColor: chartColors[index % chartColors.length],
                    tension: 0.3, 
                    borderWidth: 3,
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    pointBackgroundColor: '#ffffff',
                    pointBorderWidth: 2,
                    spanGaps: true 
                };
            });

            const endLabelPlugin = {
                id: 'endLabelPlugin',
                afterDraw: (chart) => {
                    if (window.innerWidth < 768) return; // 모바일 환경 렌더링 중지
                    
                    const ctx = chart.ctx;
                    chart.data.datasets.forEach((dataset, i) => {
                        const meta = chart.getDatasetMeta(i);
                        if (meta.hidden) return;
                        let lastIndex = -1;
                        for (let j = dataset.data.length - 1; j >= 0; j--) {
                            if (dataset.data[j] !== null && dataset.data[j] !== undefined) {
                                lastIndex = j; break;
                            }
                        }
                        if (lastIndex !== -1 && meta.data[lastIndex]) {
                            const point = meta.data[lastIndex];
                            ctx.fillStyle = dataset.borderColor;
                            ctx.font = "bold 13px 'Pretendard', sans-serif";
                            ctx.textBaseline = 'middle';
                            ctx.fillText(dataset.label, point.x + 8, point.y);
                        }
                    });
                }
            };

            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();
            
            const isMobile = window.innerWidth < 768; // 현재 화면 크기 확인

            trendChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    layout: { 
                        // 💡 [수정사항 3] 모바일이면 우측 여백을 10으로 줄이고, PC일때만 80 확보
                        padding: { right: isMobile ? 10 : 80, top: 20, bottom: 10 } 
                    },
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        // 💡 [수정사항 3] 모바일에서는 기본 범례(표 상단 부품명)를 켬
                        legend: { 
                            display: isMobile,
                            position: 'top',
                            labels: { usePointStyle: true, padding: 15, font: { family: "'Pretendard', sans-serif", weight: 'bold', size: 11 } }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.95)', titleColor: '#374151',
                            bodyColor: '#4b5563', borderColor: '#e5e7eb', borderWidth: 1, padding: 12,
                            usePointStyle: true, titleFont: { size: 13, family: "'Pretendard', sans-serif" },
                            bodyFont: { size: 13, family: "'Pretendard', sans-serif", weight: 'bold' },
                            callbacks: { label: function(c) { return c.dataset.label + ': ' + c.parsed.y + '%'; } }
                        }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { family: "'Pretendard', sans-serif", weight: 'bold' }, color: '#9ca3af' } },
                        y: { beginAtZero: true, border: { dash: [4, 4] }, grid: { color: '#f3f4f6' }, ticks: { stepSize: 20, font: { family: "'Pretendard', sans-serif", weight: 'bold' }, color: '#9ca3af', callback: function(v) { return v + '%'; } } }
                    }
                },
                plugins: [endLabelPlugin]
            });

            // 2. 상관관계(비례/반비례) 분석 및 미니 차트 생성
            miniCharts.forEach(c => c.destroy());
            miniCharts = [];
            const corrContainer = document.getElementById('correlation-charts-container');
            corrContainer.innerHTML = '';

            const correlations = [];
            for (let i = 0; i < top10Parts.length; i++) {
                for (let j = i + 1; j < top10Parts.length; j++) {
                    const p1 = top10Parts[i]; const p2 = top10Parts[j];
                    const r = getPearsonCorrelation(partSeriesMap[p1], partSeriesMap[p2]);
                    if (!isNaN(r) && r !== 0) correlations.push({ p1, p2, r });
                }
            }

            // 정렬 후 비례(가장 양수) Top 2, 반비례(가장 음수) Top 2 추출
            correlations.sort((a, b) => b.r - a.r);
            const positivePairs = correlations.filter(c => c.r > 0.4).slice(0, 2).map(c => ({...c, type: 'positive'}));
            const negativePairs = correlations.slice().reverse().filter(c => c.r < -0.4).slice(0, 2).map(c => ({...c, type: 'negative'}));
            
            const selectedPairs = [...positivePairs, ...negativePairs];

            if (selectedPairs.length === 0) {
                corrContainer.innerHTML = '<p class="text-sm font-bold text-gray-400 p-4">분석할 만큼 뚜렷한 메타 동기화 관계가 아직 발견되지 않았습니다.</p>';
            } else {
                selectedPairs.forEach((item, idx) => {
                    const id = `mini-chart-${idx}`;
                    const isPos = item.type === 'positive';
                    const relationStr = isPos ? '🤝 비례' : '⚔️ 반비례';
                    const badgeColor = isPos ? 'text-emerald-600 bg-emerald-50 border-emerald-200' : 'text-rose-600 bg-rose-50 border-rose-200';
                    const color1 = isPos ? '#10b981' : '#f43f5e'; // 초록 or 빨강
                    const color2 = '#3b82f6'; // 파랑

                    corrContainer.insertAdjacentHTML('beforeend', `
                        <div class="bg-gray-50/50 border border-gray-200 p-4 rounded-2xl shadow-sm">
                            <div class="flex justify-between items-center mb-3">
                                <div class="flex flex-col">
                                    <span class="text-sm font-black text-gray-800"><span style="color:${color1}">■</span> ${item.p1}</span>
                                    <span class="text-sm font-black text-gray-800"><span style="color:${color2}">■</span> ${item.p2}</span>
                                </div>
                                <span class="text-[10px] font-bold ${badgeColor} border px-2 py-1 rounded-lg">${relationStr}</span>
                            </div>
                            <div class="mini-chart-container">
                                <canvas id="${id}"></canvas>
                            </div>
                        </div>
                    `);

                    const miniCtx = document.getElementById(id).getContext('2d');
                    const miniChart = new Chart(miniCtx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                { label: item.p1, data: partSeriesMap[item.p1], borderColor: color1, borderWidth: 2, pointRadius: 0, tension: 0.3, spanGaps: true },
                                { label: item.p2, data: partSeriesMap[item.p2], borderColor: color2, borderWidth: 2, pointRadius: 0, tension: 0.3, spanGaps: true }
                            ]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { display: false }, tooltip: { enabled: false } },
                            scales: {
                                x: { display: false },
                                y: { display: false, beginAtZero: true }
                            }
                        }
                    });
                    miniCharts.push(miniChart);
                });
            }

            document.getElementById('loading-overlay').classList.add('hidden');
        }

        window.onload = initData;
    </script>
</body>
</html>
