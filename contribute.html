<script>
    const SUPABASE_URL = 'https://rzcprbfaxgxtggjghbds.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_E6wmdZuRD5Xe3dzLwt_KCw_FZl0Y4YJ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allParts = {
        'blade': [], 'ratchet': [], 'bit': [], 
        'lock-chip': [], 'over-blade': [], 'assist-blade': []
    };
    
    let topCombos = [];

    const prefixes = ['best', 'counter'];
    const categories = ['blade', 'lock-chip', 'over-blade', 'assist-blade', 'ratchet', 'bit'];

    function toggleMenu() {
        const navLinks = document.getElementById('nav-links');
        const menuBtnIcon = document.querySelector('#mobile-menu-btn i');
        
        if (navLinks.classList.contains('hidden')) {
            navLinks.classList.remove('hidden');
            navLinks.classList.add('flex');
            menuBtnIcon.classList.remove('fa-bars');
            menuBtnIcon.classList.add('fa-xmark');
        } else {
            navLinks.classList.add('hidden');
            navLinks.classList.remove('flex');
            menuBtnIcon.classList.remove('fa-xmark');
            menuBtnIcon.classList.add('fa-bars');
        }
    }

    function showToast(message, isError = false) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        
        toast.className = `flex items-center gap-2 px-4 py-3 rounded-xl shadow-xl transform transition-all duration-300 translate-x-full opacity-0 font-bold text-sm ${
            isError ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-green-100 text-green-700 border border-green-200'
        }`;
        
        toast.innerHTML = `<i class="fa-solid ${isError ? 'fa-triangle-exclamation' : 'fa-check'}"></i> ${message}`;
        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.remove('translate-x-full', 'opacity-0');
        }, 10);

        setTimeout(() => {
            toast.classList.add('translate-x-full', 'opacity-0');
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    }

    function getFolder(category) {
        const map = {
            'blade': 'blades',
            'lock-chip': 'lock_chips',
            'over-blade': 'over_blades',
            'assist-blade': 'assist_blades',
            'ratchet': 'ratchets',
            'bit': 'bits'
        };
        return map[category] || 'blades';
    }

    function updatePreview(prefix, cat, part) {
        const imgEl = document.getElementById(`${prefix}-preview-${cat}`);
        if(!imgEl) return;

        if(part) {
            imgEl.src = `assets/images/${getFolder(cat)}/${part.image_url || 'default.webp'}`;
            imgEl.classList.remove('opacity-50');
        } else {
            imgEl.src = `https://placehold.co/100x100/f1f5f9/64748b?text=?`;
            imgEl.classList.add('opacity-50');
        }
    }

    function renderTargetComboPreview(combo) {
        const bar = document.getElementById('target-combo-preview-bar');
        if (!combo) {
            bar.classList.add('hidden-field');
            return;
        }
        bar.classList.remove('hidden-field');
        
        const setImg = (elId, url, folder) => {
            const el = document.getElementById(elId);
            if (url) {
                el.src = `assets/images/${folder}/${url}`;
                el.classList.remove('hidden-field', 'opacity-50');
            } else {
                el.classList.add('hidden-field');
            }
        };

        setImg('target-preview-lock-chip', combo.images.lockChip, 'lock_chips');
        setImg('target-preview-over-blade', combo.images.overBlade, 'over_blades');
        setImg('target-preview-assist-blade', combo.images.assistBlade, 'assist_blades');
        
        const bladeEl = document.getElementById('target-preview-blade');
        if (combo.images.blade) {
            bladeEl.src = `assets/images/blades/${combo.images.blade}`;
            bladeEl.classList.remove('opacity-50');
        } else {
            bladeEl.src = `https://placehold.co/100x100/f1f5f9/64748b?text=?`;
            bladeEl.classList.add('opacity-50');
        }

        const ratchetEl = document.getElementById('target-preview-ratchet');
        if (combo.images.ratchet) {
            ratchetEl.src = `assets/images/ratchets/${combo.images.ratchet}`;
            ratchetEl.classList.remove('hidden-field', 'opacity-50');
        } else {
            ratchetEl.classList.add('hidden-field');
        }
        
        const bitEl = document.getElementById('target-preview-bit');
        if (combo.images.bit) {
            bitEl.src = `assets/images/bits/${combo.images.bit}`;
            bitEl.classList.remove('opacity-50');
        } else {
            bitEl.src = `https://placehold.co/100x100/f1f5f9/64748b?text=?`;
            bitEl.classList.add('opacity-50');
        }
    }

    async function init() {
        try {
            const [
                { data: blades }, { data: ratchets }, { data: bits },
                { data: lockChips }, { data: overBlades }, { data: assistBlades }
            ] = await Promise.all([
                supabaseClient.from('blades').select('*'),
                supabaseClient.from('ratchets').select('*'),
                supabaseClient.from('bits').select('*'),
                supabaseClient.from('lock_chips').select('*'),
                supabaseClient.from('over_blades').select('*'),
                supabaseClient.from('assist_blades').select('*')
            ]);

            allParts['blade'] = (blades || []).map(p => ({ ...p, category: 'blade' }));
            allParts['ratchet'] = (ratchets || []).map(p => ({ ...p, category: 'ratchet' }));
            allParts['bit'] = (bits || []).map(p => ({ ...p, category: 'bit' }));
            allParts['lock-chip'] = (lockChips || []).map(p => ({ ...p, category: 'lock-chip' }));
            allParts['over-blade'] = (overBlades || []).map(p => ({ ...p, category: 'over-blade' }));
            allParts['assist-blade'] = (assistBlades || []).map(p => ({ ...p, category: 'assist-blade' }));

            await fetchTopCombos();
            setupCustomSearchUI();
            setupTargetComboSearch(); 
            
            randomizeBladeOnly('best');
            randomizeMatchupBlades();
            
        } catch (err) {
            console.error(err);
        }
    }

    async function fetchTopCombos() {
        try {
            const { data: combos } = await supabaseClient
                .from('best_combos')
                .select(`
                    id, hit_count, blade_id, blade_mode, assist_blade_mode,
                    blades(name, image_url), ratchets(name, image_url), bits(name, image_url),
                    lock_chips(name, image_url), over_blades(name, image_url), assist_blades(name, image_url)
                `)
                .order('hit_count', { ascending: false })
                .limit(100);

            if (combos) {
                const bCounts = {};
                topCombos = [];

                for (let c of combos) {
                    if (!bCounts[c.blade_id]) bCounts[c.blade_id] = 0;
                    
                    if (bCounts[c.blade_id] < 3) {
                        bCounts[c.blade_id]++;
                        
                        let partsArr = [];
                        if (c.lock_chips?.name) partsArr.push(c.lock_chips.name);
                        if (c.over_blades?.name) partsArr.push(c.over_blades.name);
                        
                        let bName = c.blades?.name || 'Unknown';
                        if (c.blade_mode) bName += `(${c.blade_mode})`;
                        partsArr.push(bName);

                        if (c.assist_blades?.name) {
                            let aName = c.assist_blades.name;
                            if (c.assist_blade_mode) aName += `(${c.assist_blade_mode})`;
                            partsArr.push(aName);
                        }
                        
                        partsArr.push(c.ratchets?.name || 'Unknown');
                        partsArr.push(c.bits?.name || 'Unknown');

                        topCombos.push({
                            id: c.id,
                            name: partsArr.join(' '),
                            images: {
                                lockChip: c.lock_chips?.image_url,
                                overBlade: c.over_blades?.image_url,
                                blade: c.blades?.image_url,
                                assistBlade: c.assist_blades?.image_url,
                                ratchet: c.ratchets?.image_url,
                                bit: c.bits?.image_url
                            }
                        });
                    }
                    if (topCombos.length >= 30) break;
                }
            }
        } catch(err) {
            console.error("Top combos load error", err);
        }
    }

    function setupTargetComboSearch() {
        const input = document.getElementById('target-combo-input');
        const resultsDiv = document.getElementById('target-combo-results');
        
        input.addEventListener('input', () => filterTargetCombos(input.value));
        input.addEventListener('focus', () => filterTargetCombos(input.value, true));
        input.addEventListener('click', (e) => { 
            e.stopPropagation(); 
            filterTargetCombos(input.value, true); 
        });
        
        input.addEventListener('blur', () => {
            setTimeout(() => {
                const query = input.value.trim().toLowerCase();
                const hiddenId = document.getElementById('target-combo-id');
                if (!query) {
                    hiddenId.value = '';
                    renderTargetComboPreview(null);
                } else {
                    const matched = topCombos.find(c => c.name.toLowerCase() === query);
                    if (matched) {
                        input.value = matched.name;
                        hiddenId.value = matched.id;
                        renderTargetComboPreview(matched);
                    } else {
                        hiddenId.value = '';
                        renderTargetComboPreview(null);
                    }
                }
                resultsDiv.classList.add('hidden');
            }, 150);
        });
    }

    function filterTargetCombos(query, forceShowAll = false) {
        const resultsDiv = document.getElementById('target-combo-results');
        document.querySelectorAll('[id$="-results"]').forEach(div => div.classList.add('hidden'));
        
        let filtered = topCombos;
        if (!forceShowAll && query) {
            filtered = topCombos.filter(c => c.name.toLowerCase().includes(query.toLowerCase()));
        }
        
        resultsDiv.innerHTML = '';
        if (filtered.length > 0) {
            filtered.forEach(combo => {
                const div = document.createElement('div');
                div.className = 'p-3 hover:bg-red-50 cursor-pointer font-bold text-gray-700 text-sm border-b border-gray-50 last:border-0';
                div.textContent = combo.name;
                div.onclick = () => {
                    document.getElementById('target-combo-input').value = combo.name;
                    document.getElementById('target-combo-id').value = combo.id;
                    resultsDiv.classList.add('hidden');
                    renderTargetComboPreview(combo);
                };
                resultsDiv.appendChild(div);
            });
            resultsDiv.classList.remove('hidden');
        } else {
            resultsDiv.classList.add('hidden');
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.cat-btn').forEach(el => el.classList.remove('active-tab', 'text-blue-600'));
        
        document.getElementById(`section-${tabId}`).classList.remove('hidden');
        document.getElementById(`tab-btn-${tabId}`).classList.add('active-tab', 'text-blue-600');
    }

    function setupCustomSearchUI() {
        prefixes.forEach(prefix => {
            categories.forEach(cat => {
                const input = document.getElementById(`${prefix}-${cat}-input`);
                if (input) {
                    input.parentElement.classList.add('relative');
                    const resultsDiv = document.createElement('div');
                    resultsDiv.id = `${prefix}-${cat}-results`;
                    resultsDiv.className = 'absolute top-[calc(100%+4px)] left-0 right-0 bg-white border border-blue-200 rounded-xl shadow-xl z-[60] hidden max-h-60 overflow-y-auto no-scrollbar';
                    input.insertAdjacentElement('afterend', resultsDiv);

                    input.addEventListener('input', () => handleSearchCustom(prefix, cat, false));
                    input.addEventListener('focus', () => handleSearchCustom(prefix, cat, true));
                    input.addEventListener('click', (e) => {
                        e.stopPropagation();
                        handleSearchCustom(prefix, cat, true);
                    });

                    input.addEventListener('blur', () => {
                        setTimeout(() => {
                            const query = input.value.trim().toLowerCase();
                            const hiddenId = document.getElementById(`${prefix}-${cat}-id`);
                            
                            if (!query) {
                                hiddenId.value = '';
                                updatePreview(prefix, cat, null);
                                if(cat === 'blade') {
                                    updateUICX(prefix, null);
                                    checkRatchetRestriction(prefix, {});
                                }
                            } else {
                                const matched = allParts[cat].find(p => p.name.toLowerCase() === query);
                                if (matched) {
                                    selectPartCustom(prefix, cat, matched.id, matched.name);
                                } else {
                                    hiddenId.value = '';
                                    updatePreview(prefix, cat, null);
                                }
                            }
                            
                            const resDiv = document.getElementById(`${prefix}-${cat}-results`);
                            if(resDiv) resDiv.classList.add('hidden');
                        }, 150); 
                    });
                }
            });
        });
    }

    function handleSearchCustom(prefix, cat, forceShowAll = false) {
        const input = document.getElementById(`${prefix}-${cat}-input`);
        if(input.disabled) return; 
        
        const query = input.value.toLowerCase();
        const resultsDiv = document.getElementById(`${prefix}-${cat}-results`);

        document.querySelectorAll('[id$="-results"]').forEach(div => div.classList.add('hidden'));

        let filtered = allParts[cat] || [];

        const bladeId = document.getElementById(`${prefix}-blade-id`)?.value;
        const blade = allParts['blade'].find(p => p.id == bladeId);

        if (cat === 'ratchet' && blade && (blade.system_type || '').includes('simple')) {
            filtered = filtered.filter(p => (p.system_type || '') === 'simple');
        }
        if (cat === 'bit' && blade && (blade.system_type || '').includes('simple')) {
            filtered = filtered.filter(p => (p.system_type || '') !== 'integrated');
        }

        if (!forceShowAll) {
            filtered = filtered.filter(p => p.name.toLowerCase().includes(query));
        }

        filtered.sort((a, b) => a.name.localeCompare(b.name, 'ko-KR'));

        resultsDiv.innerHTML = '';
        if (filtered.length > 0) {
            filtered.forEach(part => {
                const div = document.createElement('div');
                div.className = 'p-3 hover:bg-blue-50 cursor-pointer font-bold text-gray-700 text-sm border-b border-gray-50 last:border-0';
                div.textContent = part.name;
                div.onclick = () => selectPartCustom(prefix, cat, part.id, part.name);
                resultsDiv.appendChild(div);
            });
            resultsDiv.classList.remove('hidden');
            resultsDiv.scrollTop = 0;
        } else {
            resultsDiv.classList.add('hidden');
        }
    }

    function selectPartCustom(prefix, cat, id, name) {
        const input = document.getElementById(`${prefix}-${cat}-input`);
        const hiddenId = document.getElementById(`${prefix}-${cat}-id`);
        const resultsDiv = document.getElementById(`${prefix}-${cat}-results`);
        
        if(input && hiddenId) {
            input.value = name;
            hiddenId.value = id;
        }
        if(resultsDiv) resultsDiv.classList.add('hidden');

        const part = allParts[cat].find(p => p.id == id);
        
        updatePreview(prefix, cat, part);

        if (cat === 'blade') {
            const modeSelect = document.getElementById(`${prefix}-blade-mode`);
            if (modeSelect) {
                if (part.system_type && part.system_type.includes('mode')) {
                    modeSelect.classList.remove('hidden-field');
                } else {
                    modeSelect.classList.add('hidden-field');
                    modeSelect.value = '어퍼';
                }
            }

            updateUICX(prefix, part.system_type);
            checkRatchetRestriction(prefix, part);
            
            const ratchetId = document.getElementById(`${prefix}-ratchet-id`)?.value;
            const bitId = document.getElementById(`${prefix}-bit-id`)?.value;
            
            if(ratchetId) {
                const r = allParts['ratchet'].find(p => p.id == ratchetId);
                if ((part.system_type||'').includes('simple') && r && r.system_type !== 'simple') {
                    document.getElementById(`${prefix}-ratchet-input`).value = '';
                    document.getElementById(`${prefix}-ratchet-id`).value = '';
                    updatePreview(prefix, 'ratchet', null);
                }
            }
            if(bitId) {
                const b = allParts['bit'].find(p => p.id == bitId);
                if ((part.system_type||'').includes('simple') && b && b.system_type === 'integrated') {
                    document.getElementById(`${prefix}-bit-input`).value = '';
                    document.getElementById(`${prefix}-bit-id`).value = '';
                    updatePreview(prefix, 'bit', null);
                }
            }
        }

        if (cat === 'assist-blade') {
            const modeSelect = document.getElementById(`${prefix}-assist-blade-mode`);
            if (modeSelect) {
                if (part.system_type && part.system_type.includes('mode')) {
                    modeSelect.classList.remove('hidden-field');
                } else {
                    modeSelect.classList.add('hidden-field');
                    modeSelect.value = '어퍼';
                }
            }
        }

        if (cat === 'bit') {
            checkIntegratedBit(prefix, part);
        }
    }

    document.addEventListener('click', (e) => {
        document.querySelectorAll('[id$="-results"]').forEach(div => {
            if (!div.contains(e.target) && !e.target.matches('[id$="-input"]')) div.classList.add('hidden');
        });
    });

    function updateUICX(prefix, system) {
        const cxArea = document.getElementById(`${prefix}-cx-area`);
        
        const previewLock = document.getElementById(`${prefix}-preview-lock-chip`);
        const previewOver = document.getElementById(`${prefix}-preview-over-blade`);
        const previewAssist = document.getElementById(`${prefix}-preview-assist-blade`);

        if(!cxArea) return;
        
        const lockInput = document.getElementById(`${prefix}-lock-chip-input`);
        const overInput = document.getElementById(`${prefix}-over-blade-input`);
        const assistInput = document.getElementById(`${prefix}-assist-blade-input`);
        const assistMode = document.getElementById(`${prefix}-assist-blade-mode`);
        
        if (system && system.includes('cx')) {
            cxArea.classList.remove('hidden-field');
            if(previewLock) previewLock.classList.remove('hidden-field');
            if(previewAssist) previewAssist.classList.remove('hidden-field');

            if (system.includes('cx-ex')) {
                overInput.classList.remove('hidden-field');
                if(previewOver) previewOver.classList.remove('hidden-field');
            } else {
                overInput.classList.add('hidden-field');
                overInput.value = ''; document.getElementById(`${prefix}-over-blade-id`).value = '';
                if(previewOver) previewOver.classList.add('hidden-field');
                updatePreview(prefix, 'over-blade', null);
            }
        } else {
            cxArea.classList.add('hidden-field');
            if(previewLock) previewLock.classList.add('hidden-field');
            if(previewOver) previewOver.classList.add('hidden-field');
            if(previewAssist) previewAssist.classList.add('hidden-field');

            [lockInput, overInput, assistInput].forEach(el => { if(el) el.value = ''; });
            [`${prefix}-lock-chip-id`, `${prefix}-over-blade-id`, `${prefix}-assist-blade-id`].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.value = '';
            });
            ['lock-chip', 'over-blade', 'assist-blade'].forEach(cat => updatePreview(prefix, cat, null));

            if (assistMode) {
                assistMode.classList.add('hidden-field');
                assistMode.value = '어퍼';
            }
        }
    }

    function checkRatchetRestriction(prefix, blade) {
        const ratchetInput = document.getElementById(`${prefix}-ratchet-input`);
        if(!ratchetInput) return;

        if (blade.system_type && blade.system_type.includes('simple')) {
            ratchetInput.placeholder = "심플 래칫만 선택 가능";
        } else {
            if (ratchetInput.placeholder.includes("심플")) ratchetInput.placeholder = "래칫 검색...";
        }
    }

    function checkIntegratedBit(prefix, bit) {
        const ratchetInput = document.getElementById(`${prefix}-ratchet-input`);
        const ratchetHidden = document.getElementById(`${prefix}-ratchet-id`);
        if(!ratchetInput) return;

        if (bit.system_type === 'integrated') {
            ratchetInput.value = "일체형 (선택 불가)";
            ratchetHidden.value = "";
            ratchetInput.disabled = true;
            ratchetInput.classList.add('bg-gray-200', 'text-gray-400');
            updatePreview(prefix, 'ratchet', null); 
        } else {
            if (ratchetInput.disabled) {
                ratchetInput.value = ""; 
                ratchetInput.disabled = false;
                ratchetInput.classList.remove('bg-gray-200', 'text-gray-400');
                
                const bladeId = document.getElementById(`${prefix}-blade-id`).value;
                const blade = allParts['blade'].find(p => p.id == bladeId);
                ratchetInput.placeholder = (blade && (blade.system_type||'').includes('simple')) ? "심플 래칫만 선택 가능" : "래칫 검색...";
            }
        }
    }

    function randomizeBladeOnly(prefix) {
        const blades = allParts['blade'];
        if(blades.length === 0) return;
        
        const randomBlade = blades[Math.floor(Math.random() * blades.length)];
        selectPartCustom(prefix, 'blade', randomBlade.id, randomBlade.name);

        ['ratchet', 'bit', 'lock-chip', 'over-blade', 'assist-blade'].forEach(cat => {
            const input = document.getElementById(`${prefix}-${cat}-input`);
            const hidden = document.getElementById(`${prefix}-${cat}-id`);
            if(input) {
                input.value = '';
                input.disabled = false;
                input.classList.remove('bg-gray-200', 'text-gray-400');
            }
            if(hidden) hidden.value = '';
            updatePreview(prefix, cat, null);
        });
        
        const bMode = document.getElementById(`${prefix}-blade-mode`);
        if (bMode && !(randomBlade.system_type||'').includes('mode')) {
            bMode.classList.add('hidden-field');
            bMode.value = '어퍼';
        }
        
        checkRatchetRestriction(prefix, randomBlade);
    }

    function randomizeMatchupBlades() {
        const blades = allParts['blade'];
        if(blades.length < 2) return;

        let leftBlade, rightBlade;

        leftBlade = blades[Math.floor(Math.random() * blades.length)];
        do {
            rightBlade = blades[Math.floor(Math.random() * blades.length)];
        } while (rightBlade.id === leftBlade.id); 

        document.getElementById('mleft-blade-input').value = leftBlade.name;
        document.getElementById('mleft-blade-id').value = leftBlade.id;
        document.getElementById('mleft-blade-img').src = `assets/images/blades/${leftBlade.image_url || 'default.webp'}`;

        document.getElementById('mright-blade-input').value = rightBlade.name;
        document.getElementById('mright-blade-id').value = rightBlade.id;
        document.getElementById('mright-blade-img').src = `assets/images/blades/${rightBlade.image_url || 'default.webp'}`;
    }


    const getVal = (id) => { const v = document.getElementById(id)?.value; return v ? parseInt(v) : null; };
    const getMode = (id) => { const el = document.getElementById(id); return (el && !el.classList.contains('hidden-field')) ? el.value : null; };

    function validateRequiredParts(prefix) {
        const bladeId = getVal(`${prefix}-blade-id`);
        const ratchetId = getVal(`${prefix}-ratchet-id`);
        const bitId = getVal(`${prefix}-bit-id`);
        
        const ratchetInput = document.getElementById(`${prefix}-ratchet-input`);
        const isRatchetDisabled = ratchetInput ? ratchetInput.disabled : false;
        
        if (!bladeId || !bitId) return false;
        if (!isRatchetDisabled && !ratchetId) return false;

        const blade = allParts['blade'].find(p => p.id == bladeId);
        if (blade && blade.system_type) {
            const st = blade.system_type.toLowerCase();
            if (st.includes('cx')) {
                const lockChipId = getVal(`${prefix}-lock-chip-id`);
                const assistBladeId = getVal(`${prefix}-assist-blade-id`);
                if (!lockChipId || !assistBladeId) return false;

                if (st.includes('cx-ex')) {
                    const overBladeId = getVal(`${prefix}-over-blade-id`);
                    if (!overBladeId) return false;
                }
            }
        }
        return true;
    }

    async function submitBestCombo() {
        if (!validateRequiredParts('best')) {
            showToast("선택된 파츠 정보를 다시 확인해주세요.", true);
            return;
        }

        const payload = {
            blade_id: getVal('best-blade-id'),
            blade_mode: getMode('best-blade-mode'),
            lock_chip_id: getVal('best-lock-chip-id'),
            over_blade_id: getVal('best-over-blade-id'),
            assist_blade_id: getVal('best-assist-blade-id'),
            assist_blade_mode: getMode('best-assist-blade-mode'),
            ratchet_id: getVal('best-ratchet-id'),
            bit_id: getVal('best-bit-id')
        };

        try {
            let query = supabaseClient.from('best_combos').select('id, hit_count')
                .eq('blade_id', payload.blade_id).eq('bit_id', payload.bit_id);
            
            if(payload.ratchet_id) query = query.eq('ratchet_id', payload.ratchet_id);
            else query = query.is('ratchet_id', null);

            ['lock_chip_id', 'over_blade_id', 'assist_blade_id', 'blade_mode', 'assist_blade_mode'].forEach(key => {
                if(payload[key]) query = query.eq(key, payload[key]);
                else query = query.is(key, null);
            });

            const { data, error: selectError } = await query;
            if (selectError) throw selectError;

            if (data && data.length > 0) {
                const { error: updateError } = await supabaseClient.from('best_combos').update({ hit_count: data[0].hit_count + 1 }).eq('id', data[0].id);
                if (updateError) throw updateError;
            } else {
                payload.hit_count = 1;
                const { error: insertError } = await supabaseClient.from('best_combos').insert([payload]);
                if (insertError) throw insertError;
            }
            
            showToast("추천 조합이 성공적으로 등록되었습니다!");
            randomizeBladeOnly('best');

            await fetchTopCombos();

        } catch(e) { 
            showToast("서버 전송 중 오류가 발생했습니다.", true);
            console.error("Supabase 전송 에러 상세:", e); 
        }
    }

    async function recordMatchup(result) {
        const left_id = getVal('mleft-blade-id');
        const right_id = getVal('mright-blade-id');
        
        if(!left_id || !right_id) {
            showToast("블레이드 데이터가 없습니다.", true);
            return;
        }

        if (result !== 0) {
            let bladeA = Math.min(left_id, right_id);
            let bladeB = Math.max(left_id, right_id);
            
            let scoreChange = (left_id === bladeA) ? result : -result;

            try {
                const { data } = await supabaseClient
                    .from('blade_matchup_scores')
                    .select('score')
                    .eq('blade_a_id', bladeA)
                    .eq('blade_b_id', bladeB)
                    .single();

                let newScore = scoreChange;
                if (data) newScore += data.score;

                const { error: upsertError } = await supabaseClient
                    .from('blade_matchup_scores')
                    .upsert({
                        blade_a_id: bladeA,
                        blade_b_id: bladeB,
                        score: newScore
                    });
                
                if (upsertError) throw upsertError;

                showToast("상성이 성공적으로 기록되었습니다!");
            } catch (e) {
                showToast("전송 실패. 다시 시도해주세요.", true);
                console.error(e);
            }
        } else {
            showToast("무승부 (기록 스킵됨)");
        }
        
        randomizeMatchupBlades();
    }

    async function submitCounter(result) {
        if (!getVal('target-combo-id')) {
            showToast("타겟 1티어 조합을 선택해주세요.", true);
            return;
        }

        if (!validateRequiredParts('counter')) {
            showToast("선택된 파츠 정보를 다시 확인해주세요.", true);
            return;
        }

        const payload = {
            target_combo_id: getVal('target-combo-id'),
            counter_blade_id: getVal('counter-blade-id'),
            counter_blade_mode: getMode('counter-blade-mode'),
            counter_lock_chip_id: getVal('counter-lock-chip-id'),
            counter_over_blade_id: getVal('counter-over-blade-id'),
            counter_assist_blade_id: getVal('counter-assist-blade-id'),
            counter_assist_blade_mode: getMode('counter-assist-blade-mode'),
            counter_ratchet_id: getVal('counter-ratchet-id'),
            counter_bit_id: getVal('counter-bit-id'),
            result: result 
        };

        try {
            const { error: insertError } = await supabaseClient.from('combo_counters').insert([payload]);
            if (insertError) throw insertError;

            showToast("카운터 공략이 성공적으로 등록되었습니다!");
            
            document.getElementById('counter-blade-input').value = '';
            document.getElementById('counter-blade-id').value = '';
            updatePreview('counter', 'blade', null);
            const bMode = document.getElementById('counter-blade-mode');
            if(bMode) { bMode.classList.add('hidden-field'); bMode.value='어퍼'; }
            
            updateUICX('counter', null);
            document.getElementById('counter-ratchet-input').value = '';
            document.getElementById('counter-ratchet-id').value = '';
            updatePreview('counter', 'ratchet', null);
            document.getElementById('counter-bit-input').value = '';
            document.getElementById('counter-bit-id').value = '';
            updatePreview('counter', 'bit', null);
            
        } catch(e) { 
            showToast("서버 전송 중 오류가 발생했습니다.", true);
            console.error("Supabase 카운터 전송 에러 상세:", e); 
        }
    }

    window.onload = init;
</script>
